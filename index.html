<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Home Hub · Home Management</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

html, body {
  margin: 0;
  min-height: 100%;
}

#budget-app, #budget-app * { box-sizing: border-box; }
#budget-app {
  --bg-a: #F7DCEA;
  --bg-b: #CBD3EF;
  --plum: #3A2647;
  --plum-2: #4C3260;
  --blush: #F4DCE8;
  --blush-ink: #5B3D5C;
  --mauve: #B98FB3;
  --mauve-deep: #8B5A96;
  --paper: #FFFFFF;
  --ink: #2E1F38;
  --ink-soft: #6E5E77;
  --ink-on-dark: #F5EEF4;
  --ink-on-dark-soft: #C9B9D1;
  --line: rgba(46,31,56,0.08);
  --line-dark: rgba(245,238,244,0.14);
  --good: #3E7C6C;
  --warn: #D4A947;
  --danger: #C1495C;
  --neutral: #9C8FAE;

  --cat-groceries: #3E7C6C;
  --cat-dining: #D4A947;
  --cat-transport: #5C6B8A;
  --cat-shopping: #8B4F8F;
  --cat-bills: #C1495C;
  --cat-health: #3D8B96;
  --cat-travel: #6B3FA0;
  --cat-other: #8A8296;

  --who-jared: #4A6FA5;
  --who-tessa: #C45B7A;
  --who-poppy: #E0A23A;
  --who-griffy: #3D9B7A;
  --who-family: #8B5A96;

  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: linear-gradient(135deg, var(--bg-a) 0%, #E7D3EC 45%, var(--bg-b) 100%);
  min-height: 100vh;
  min-height: 100dvh;
  width: 100%;
  padding: 22px;
  padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

#budget-app .shell { max-width: 1180px; margin: 0 auto; width: 100%; }
#budget-app .auth-card { max-width: 440px; width: 100%; margin: 30px auto; }

/* ---- top bar ---- */
#budget-app .topbar {
  background: linear-gradient(120deg, var(--mauve) 0%, var(--mauve-deep) 100%);
  border-radius: 20px;
  padding: 16px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
#budget-app .brand {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.06em;
  color: #FFFFFF;
  text-transform: uppercase;
}
#budget-app .brand .sub { display:block; font-family:'Inter',sans-serif; font-weight:400; text-transform:none; letter-spacing:0; font-size:12px; color: rgba(255,255,255,0.8); margin-top:2px; }
#budget-app .topbar-actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
#budget-app .pill-btn {
  background: rgba(255,255,255,0.16);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
}
#budget-app .pill-btn .label-short { display: none; }
#budget-app .pill-btn.solid { background: var(--plum); border-color: var(--plum); }
#budget-app .pill-btn.insights { background: rgba(255,255,255,0.06); border: 1.5px solid var(--warn); color: #fff; }
#budget-app .pill-btn.insights:hover { background: rgba(212,169,71,0.18); }
#budget-app .pill-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

/* ---- layout grid ---- */
#budget-app .grid { display: grid; grid-template-columns: minmax(260px, 300px) minmax(0, 1fr); gap: 18px; align-items: start; }
@media (max-width: 1024px) { #budget-app .grid { grid-template-columns: minmax(240px, 280px) minmax(0, 1fr); gap: 14px; } }
@media (max-width: 900px) { #budget-app .grid { grid-template-columns: 1fr; } }

#budget-app .left-col { display: flex; flex-direction: column; gap: 18px; }

#budget-app .card {
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s ease;
}
#budget-app .card:hover { transform: translateY(-2px); }
#budget-app .card:focus-visible { outline: 2px solid var(--mauve-deep); outline-offset: 2px; }

/* ---- gauge card ---- */
#budget-app .gauge-card {
  background: linear-gradient(160deg, var(--plum) 0%, var(--plum-2) 100%);
  color: var(--ink-on-dark);
  padding: 26px 20px 22px;
  display: flex; flex-direction: column; align-items: center;
}
#budget-app .gauge-wrap { position: relative; width: 190px; height: 190px; margin-bottom: 14px; }
#budget-app .gauge-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
#budget-app .ring-track { fill: none; stroke-linecap: round; }
#budget-app .ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
#budget-app .gauge-center {
  position: absolute;
  inset: 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  box-sizing: border-box;
}
#budget-app .gauge-amount {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 22px;
  line-height: 1;
  max-width: 100%;
  white-space: nowrap;
  letter-spacing: -0.02em;
}
#budget-app .gauge-amount.is-long { font-size: 18px; }
#budget-app .gauge-amount.is-xl { font-size: 15px; }
#budget-app .gauge-label { font-size: 11px; color: var(--ink-on-dark-soft); margin-top: 6px; letter-spacing: 0.03em; }
#budget-app .status-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--line-dark);
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 13px; font-weight: 600;
  margin-bottom: 10px;
}
#budget-app .status-emoji { font-size: 16px; display: inline-block; animation: pulse-emoji 1.8s ease-in-out infinite; }
@keyframes pulse-emoji { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
#budget-app .gauge-caption { font-size: 12px; color: var(--ink-on-dark-soft); text-align: center; line-height: 1.5; }
#budget-app .daily-stats-row { display: flex; gap: 10px; width: 100%; margin-top: 16px; }
#budget-app .daily-stat { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid var(--line-dark); border-radius: 12px; padding: 10px 8px; text-align: center; }
#budget-app .daily-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-on-dark-soft); margin-bottom: 5px; }
#budget-app .daily-stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
#budget-app .daily-stat-sub { font-size: 10px; color: var(--ink-on-dark-soft); margin-top: 2px; }
#budget-app .gauge-bar-wrap { width: 100%; margin-top: 4px; }
#budget-app .gauge-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-on-dark-soft); margin-bottom: 6px; }
#budget-app .gauge-bar-track { height: 10px; border-radius: 6px; background: rgba(255,255,255,0.16); overflow: hidden; }
#budget-app .gauge-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease, background 0.6s ease; }


/* ---- categories card ---- */
#budget-app .cat-card {
  background: var(--blush);
  color: var(--blush-ink);
  padding: 20px;
}
#budget-app .cat-title { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--blush-ink); opacity: 0.75; margin-bottom: 14px; font-weight: 600; }
#budget-app .cat-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; cursor: pointer; }
#budget-app .cat-row:not(:last-child) { border-bottom: 1px solid rgba(91,61,92,0.12); }
#budget-app .cat-circle {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--plum); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
#budget-app .cat-info { flex: 1; }
#budget-app .cat-name { font-size: 14px; font-weight: 600; }
#budget-app .cat-amount { font-size: 12px; opacity: 0.7; font-family: 'IBM Plex Mono', monospace; }
#budget-app .cat-empty { font-size: 13px; opacity: 0.7; padding: 6px 0; }

/* ---- chart card ---- */
#budget-app .chart-card {
  background: linear-gradient(160deg, var(--plum-2) 0%, var(--plum) 100%);
  color: var(--ink-on-dark);
  padding: 20px;
}
#budget-app .chart-title { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-on-dark-soft); margin-bottom: 4px; font-weight: 600; }
#budget-app .chart-sub { font-size: 11px; color: var(--ink-on-dark-soft); margin-bottom: 14px; }
#budget-app .chart-svg-wrap svg { width: 100%; height: 128px; display: block; }

/* ---- right table / calendar card ---- */
#budget-app .table-card { background: var(--paper); border-radius: 20px; padding: 20px 22px 8px; }
#budget-app .table-head-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
#budget-app .table-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 20px; }
#budget-app .table-total { font-size: 13px; color: var(--ink-soft); }
#budget-app .table-total b { font-family: 'IBM Plex Mono', monospace; color: var(--ink); }

#budget-app .cal-card { background: var(--paper); border-radius: 20px; padding: 20px 22px 18px; }
#budget-app .cal-nav { display: flex; align-items: center; gap: 8px; }
#budget-app .cal-nav-btn {
  background: var(--blush); border: 1px solid var(--line); border-radius: 10px;
  width: 36px; height: 36px; cursor: pointer; font-size: 16px; color: var(--ink);
}
#budget-app .cal-month-label { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; min-width: 140px; text-align: center; }
#budget-app .cal-grid {
  display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); gap: 6px; margin-top: 14px;
}
#budget-app .cal-dow {
  text-align: center; font-size: 11px; font-weight: 600; color: var(--ink-soft);
  text-transform: uppercase; letter-spacing: 0.04em; padding: 4px 0 8px;
}
#budget-app .cal-day {
  min-height: 78px; border-radius: 12px; border: 1px solid var(--line); background: #fbf7fb;
  padding: 6px 7px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; text-align: left;
  transition: background 0.12s ease, border-color 0.12s ease;
}
#budget-app .cal-day:hover { background: var(--blush); }
#budget-app .cal-day.out { opacity: 0.38; }
#budget-app .cal-day.today { border-color: var(--mauve-deep); box-shadow: inset 0 0 0 1px var(--mauve-deep); }
#budget-app .cal-day.selected { background: rgba(139,90,150,0.12); border-color: var(--mauve-deep); }
#budget-app .cal-day-num { font-size: 12px; font-weight: 700; color: var(--ink); font-family: 'IBM Plex Mono', monospace; }
#budget-app .cal-day-spend { font-size: 10px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
#budget-app .cal-chip {
  font-size: 10px; font-weight: 600; line-height: 1.2; padding: 3px 5px; border-radius: 6px;
  background: var(--mauve); color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
}
#budget-app .cal-chip.more { background: var(--blush); color: var(--blush-ink); }
#budget-app .cal-chip.who-jared { background: var(--who-jared); }
#budget-app .cal-chip.who-tessa { background: var(--who-tessa); }
#budget-app .cal-chip.who-poppy { background: var(--who-poppy); }
#budget-app .cal-chip.who-griffy { background: var(--who-griffy); }
#budget-app .cal-chip.who-family { background: var(--who-family); }
#budget-app .who-legend {
  display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; align-items: center;
}
#budget-app .who-pill {
  display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600;
  padding: 5px 10px; border-radius: 999px; color: #fff;
}
#budget-app .who-pill i { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.85); }
#budget-app .who-picker { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
#budget-app .who-pick {
  border: 2px solid transparent; border-radius: 999px; padding: 7px 12px; font-size: 12px; font-weight: 700;
  color: #fff; cursor: pointer;
}
#budget-app .who-pick.active { box-shadow: 0 0 0 2px var(--ink); }
#budget-app .gcal-bar {
  display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
  margin-bottom: 12px; padding: 10px 12px; border-radius: 12px; background: #fbf7fb; border: 1px solid var(--line);
}
#budget-app .gcal-status { font-size: 12px; color: var(--ink-soft); }
#budget-app .gcal-status strong { color: var(--ink); }
#budget-app .cal-event-person {
  display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700;
  color: #fff; border-radius: 999px; padding: 3px 8px; margin-top: 6px;
}
#budget-app .cal-event-time {
  font-size: 12px; font-weight: 600; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; margin-bottom: 2px;
}
#budget-app .cal-time-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px;
}
#budget-app .cal-allday-toggle {
  display: inline-flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; user-select: none; margin-top: 4px;
}
#budget-app .cal-allday-toggle input { width: 16px; height: 16px; accent-color: var(--mauve-deep); }
#budget-app .cal-day-panel {
  margin-top: 14px; border-top: 1px solid var(--line); padding-top: 14px;
}
#budget-app .cal-day-panel-head {
  display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;
}
#budget-app .cal-event-row {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
  padding: 12px 12px; border-radius: 12px; background: #fbf7fb; border: 1px solid var(--line); margin-bottom: 8px;
}
#budget-app .cal-event-title { font-weight: 600; font-size: 14px; }
#budget-app .cal-event-notes { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }
#budget-app .cal-event-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; }
#budget-app .cal-link {
  display: inline-flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600;
  color: var(--mauve-deep); text-decoration: none; background: var(--blush); border: 1px solid var(--line);
  border-radius: 999px; padding: 7px 11px; cursor: pointer;
}
#budget-app .cal-link.danger { color: var(--danger); }

#budget-app .filter-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
#budget-app .filter-tab {
  background: none; border: none; font-size: 14px; color: var(--ink-soft); cursor: pointer; padding: 4px 0; font-weight: 500;
}
#budget-app .filter-tab.active { color: var(--ink); font-weight: 700; border-bottom: 2px solid var(--mauve-deep); }
#budget-app .search-input {
  margin-left: auto; background: var(--blush); border: 1px solid var(--line); border-radius: 10px;
  padding: 9px 14px; font-size: 13px; color: var(--ink); min-width: 160px; flex: 1 1 160px; max-width: 280px;
}
#budget-app .search-input::placeholder { color: var(--ink-soft); }

#budget-app .row-head {
  display: grid; grid-template-columns: 72px minmax(0, 1.4fr) minmax(0, 1fr) minmax(0, 1fr) 84px; gap: 10px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);
  padding: 0 10px 10px; font-weight: 600;
}
#budget-app .tx-list { max-height: min(55vh, 520px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
#budget-app .tx-row {
  display: grid; grid-template-columns: 72px minmax(0, 1.4fr) minmax(0, 1fr) minmax(0, 1fr) 84px; gap: 10px; align-items: center;
  padding: 13px 10px; border-radius: 12px; cursor: pointer;
}
#budget-app .tx-row:hover { background: var(--blush); }
#budget-app .tx-date { font-size: 12px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
#budget-app .tx-desc { font-size: 14px; font-weight: 500; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#budget-app .tx-card-cell { font-size: 12px; color: var(--ink-soft); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#budget-app .tx-cat-cell { min-width: 0; }
#budget-app .cat-pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px;
  font-size: 11px; font-weight: 600; color: #fff; width: fit-content; max-width: 100%;
}
#budget-app .cat-pill i { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.8); flex-shrink: 0; }
#budget-app .tx-amount { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; text-align: right; white-space: nowrap; }
#budget-app .empty-state { color: var(--ink-soft); font-size: 14px; padding: 40px 10px; text-align: center; }
#budget-app .import-toast {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  background: var(--paper); border: 1px solid var(--line); border-radius: 14px;
  padding: 12px 16px; margin-bottom: 14px; font-size: 13px; color: var(--ink);
}
#budget-app .toast-dismiss {
  background: none; border: none; color: var(--mauve-deep); font-weight: 600; cursor: pointer; font-size: 13px;
}

/* ---- modals ---- */
#budget-app .modal-overlay {
  position: fixed; inset: 0; background: rgba(46,31,56,0.55);
  display: flex; align-items: flex-end; justify-content: center; z-index: 50;
}
#budget-app .modal-card {
  background: var(--paper); width: 100%; max-width: 560px;
  border-radius: 22px 22px 0 0; padding: 24px 20px 30px; max-height: 88vh; overflow-y: auto;
}
#budget-app .modal-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; margin-bottom: 4px; }
#budget-app .modal-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 18px; }

#budget-app .amount-display { font-family: 'IBM Plex Mono', monospace; font-size: 40px; font-weight: 600; text-align: center; margin-bottom: 16px; }
#budget-app .note-input, #budget-app .text-input {
  width: 100%; background: var(--blush); border: 1px solid var(--line); color: var(--ink);
  border-radius: 12px; padding: 14px; font-size: 15px; font-family: 'Inter', sans-serif; margin-bottom: 16px;
}
#budget-app .note-input::placeholder, #budget-app .text-input::placeholder { color: var(--ink-soft); }
#budget-app .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
#budget-app .key {
  background: var(--blush); border: 1px solid var(--line); color: var(--ink);
  font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500;
  border-radius: 12px; padding: 16px 0; cursor: pointer;
}
#budget-app .key:active { background: var(--mauve); color: #fff; }
#budget-app .modal-actions { display: flex; gap: 10px; }
#budget-app .btn-secondary, #budget-app .btn-primary {
  flex: 1; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; border: none;
}
#budget-app .btn-secondary { background: var(--blush); color: var(--ink); }
#budget-app .btn-primary { background: var(--mauve-deep); color: #fff; }
#budget-app .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
#budget-app .btn-danger { background: var(--danger); color: #fff; }

#budget-app .settings-field { margin-bottom: 16px; }
#budget-app .settings-field label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; }
#budget-app .settings-field input {
  width: 100%; background: var(--blush); border: 1px solid var(--line); color: var(--ink);
  border-radius: 12px; padding: 14px; font-size: 17px; font-family: 'IBM Plex Mono', monospace;
}
#budget-app .readout {
  font-family: 'IBM Plex Mono', monospace; font-size: 16px; padding: 14px; background: var(--blush); border-radius: 12px; border: 1px solid var(--line);
}

#budget-app .file-drop { border: 1px dashed var(--line); border-radius: 14px; padding: 26px 16px; text-align: center; color: var(--ink-soft); font-size: 14px; margin-bottom: 16px; transition: background 0.15s ease, border-color 0.15s ease; }
#budget-app .file-drop.dragging { border-color: var(--mauve-deep); background: var(--blush); color: var(--ink); }
#budget-app .file-drop-icon { font-size: 26px; margin-bottom: 8px; display: block; }
#budget-app .file-drop input[type="file"] { margin-top: 12px; font-size: 13px; }
#budget-app .import-error { background: rgba(193,73,92,0.1); border: 1px solid var(--danger); border-radius: 12px; padding: 14px; font-size: 13px; margin-bottom: 16px; }

<body>

<div id="budget-app">
  <div class="shell" id="app-root">
    <div class="loading">Loading budget…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="config.js"></script>
<script>
(function(){
  const cfg = window.BUDGET_CONFIG;
  if (!cfg || !cfg.url || !cfg.anonKey) {
    document.getElementById('app-root').innerHTML = '<div class="loading">Missing cloud config. Check config.js.</div>';
    return;
  }
  const sb = supabase.createClient(cfg.url, cfg.anonKey);
  const CODE_KEY = 'budget:accessCode';

  const root = document.getElementById('app-root');

  const DEFAULT_CATEGORIES = [
    { name: 'Groceries', color: 'var(--cat-groceries)', keywords: ['grocery','groceries','market','whole foods','trader joe','safeway','kroger','aldi','grocer','wegmans','sprouts','publix'], builtin: true },
    { name: 'Dining & Coffee', color: 'var(--cat-dining)', keywords: ['restaurant','cafe','coffee','starbucks','doordash','uber eats','grubhub','chipotle','pizza','bar ','diner','bakery','taqueria','sushi'], builtin: true },
    { name: 'Transport', color: 'var(--cat-transport)', keywords: ['uber','lyft','gas','shell','chevron','exxon','parking','transit','metro','fuel','76 ','arco'], builtin: true },
    { name: 'Shopping', color: 'var(--cat-shopping)', keywords: ['amazon','target','walmart','store','shop','mall','costco','best buy','ikea'], builtin: true },
    { name: 'Bills & Subscriptions', color: 'var(--cat-bills)', keywords: ['netflix','spotify','comcast','verizon','at&t','att bill','insurance','utility','electric','water bill','subscription','hulu','disney+','apple.com/bill','internet'], builtin: true },
    { name: 'Health & Wellness', color: 'var(--cat-health)', keywords: ['pharmacy','cvs','walgreens','doctor','clinic','gym','fitness','dental','vision'], builtin: true },
    { name: 'Travel', color: 'var(--cat-travel)', keywords: ['airline','hotel','airbnb','marriott','delta ','united ','southwest','hilton','expedia'], builtin: true },
    { name: 'Other', color: 'var(--cat-other)', keywords: [], builtin: true }
  ];

  const CATEGORY_COLORS = [
    '#3E7C6C', '#D4A947', '#5C6B8A', '#8B4F8F', '#C1495C',
    '#3D8B96', '#6B3FA0', '#8A8296', '#B98FB3', '#4C3260',
    '#2E6B5A', '#C47A3A'
  ];

  // Household people — UI colors + Google Calendar colorIds
  const PEOPLE = [
    { id: 'Jared', color: 'var(--who-jared)', css: 'who-jared', gcalColorId: '9' },   // blueberry
    { id: 'Tessa', color: 'var(--who-tessa)', css: 'who-tessa', gcalColorId: '4' },   // flamingo
    { id: 'Poppy', color: 'var(--who-poppy)', css: 'who-poppy', gcalColorId: '5' },   // banana
    { id: 'Griffy', color: 'var(--who-griffy)', css: 'who-griffy', gcalColorId: '10' }, // basil
    { id: 'Family', color: 'var(--who-family)', css: 'who-family', gcalColorId: '3' }  // grape
  ];
  const PERSON_IDS = PEOPLE.map(p => p.id);
  const GCAL_SCOPES = 'https://www.googleapis.com/auth/calendar';
  const GCAL_CAL_NAME = 'Home Hub';

  let customCategories = []; // {id, name, color}
  let merchantRules = []; // {merchantKey, category, label}
  let companyAliases = []; // {id?, rawKey, companyName}
  let calendarEvents = []; // {id, title, notes, startTs, endTs, allDay, person, gcalEventId}
  let calendarCursor = null; // Date at month start for calendar view
  let selectedCalDay = null; // 'YYYY-MM-DD' or null
  let calendarDraft = null; // { id?, dateKey, title, notes, person, allDay, startTime, endTime }
  let calendarError = '';
  let gcalCalendarId = null;
  let gcalAccessToken = null;
  let gcalTokenExpiresAt = 0;
  let gcalBusy = false;
  let gcalStatus = '';
  let gcalTokenClient = null;
  let newCatName = '';
  let newCatColor = CATEGORY_COLORS[0];
  let taxonomyError = '';
  let expandedCats = new Set();
  let expandedMerchants = new Set(); // `${category}::${merchantKey}`
  let expandedCompanies = new Set(); // company keys on the Companies page
  let merchantRecat = null; // { key, cat, label }

  function personMeta(name){
    return PEOPLE.find(p => p.id === name) || PEOPLE[PEOPLE.length - 1];
  }
  function normalizePerson(name){
    const n = String(name || '').trim();
    return PERSON_IDS.includes(n) ? n : 'Family';
  }

  function allCategories(){
    const customs = customCategories.map(c => ({
      name: c.name,
      color: c.color,
      keywords: [],
      builtin: false,
      id: c.id
    }));
    // Keep Other last; insert customs before Other
    const builtins = DEFAULT_CATEGORIES.filter(c => c.name !== 'Other');
    const other = DEFAULT_CATEGORIES.find(c => c.name === 'Other');
    return [...builtins, ...customs, other];
  }

  function merchantKeyFromNote(note){
    let s = String(note || '').toLowerCase();
    s = s.replace(/^aplpay\s+/i, '');
    s = s.replace(/^tst\*\s*/i, '');
    s = s.replace(/\s+/g, ' ').trim();
    // Drop trailing city/state-ish noise when possible
    s = s.replace(/\s+[a-z]{2}$/i, '').trim();
    if (!s) return '';
    // Prefer a stable prefix for matching future similar descriptions
    return s.slice(0, 32).trim();
  }

  function companySlug(name){
    return String(name || '')
      .toLowerCase()
      .replace(/&/g, ' and ')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '') || '';
  }

  function resolveCompany(note){
    const raw = String(note || '');
    const n = raw.toLowerCase();
    const fallbackKey = merchantKeyFromNote(note) || '__unknown__';
    const fallbackLabel = (() => {
      const cleaned = raw.replace(/\s+/g, ' ').trim();
      return cleaned.slice(0, 48) || (fallbackKey === '__unknown__' ? 'Unknown place' : fallbackKey);
    })();
    if (!n || !companyAliases.length){
      return { key: fallbackKey, label: fallbackLabel, standardized: false, rawKey: fallbackKey };
    }
    const sorted = [...companyAliases].sort((a, b) => (b.rawKey || '').length - (a.rawKey || '').length);
    for (const alias of sorted){
      const rk = String(alias.rawKey || '').toLowerCase().trim();
      if (!rk || rk.length < 2) continue;
      if (n.includes(rk) || fallbackKey === rk || fallbackKey.startsWith(rk)){
        const label = String(alias.companyName || '').trim() || fallbackLabel;
        const key = companySlug(label) || fallbackKey;
        return { key, label, standardized: true, rawKey: rk };
      }
    }
    return { key: fallbackKey, label: fallbackLabel, standardized: false, rawKey: fallbackKey };
  }

  function merchantLabelFromNote(note){
    return resolveCompany(note).label;
  }

  function categorize(note){
    const n = (note || '').toLowerCase();
    if (n){
      // Merchant memory wins over keyword heuristics
      const sorted = [...merchantRules].sort((a, b) => (b.merchantKey||'').length - (a.merchantKey||'').length);
      for (const rule of sorted){
        const key = (rule.merchantKey || '').toLowerCase();
        if (key && n.includes(key)) return rule.category;
      }
    }
    for (const cat of allCategories()){
      if (cat.name === 'Other') continue;
      if ((cat.keywords || []).some(k => n.includes(k))) return cat.name;
    }
    return 'Other';
  }
  function catColor(name){
    const c = allCategories().find(c => c.name === name);
    return c ? c.color : 'var(--cat-other)';
  }
  function getCategory(t){
    return t.categoryOverride || categorize(t.note);
  }

  let settings = null;
  let transactions = [];
  let accessCode = localStorage.getItem(CODE_KEY) || '';
  let authError = '';
  let authBusy = false;

  function normalizeTx(t){
    return {
      id: String(t.id),
      amount: Number(t.amount),
      note: t.note || '',
      ts: Number(t.ts),
      source: t.source || 'manual',
      card: t.card || '',
      categoryOverride: t.categoryOverride || undefined
    };
  }

  function txPayload(){
    return transactions.map(t => ({
      id: t.id,
      amount: t.amount,
      note: t.note || '',
      ts: t.ts,
      source: t.source || 'manual',
      card: t.card || '',
      categoryOverride: t.categoryOverride || null
    }));
  }

  async function rpc(name, args){
    const { data, error } = await sb.rpc(name, args);
    if (error) throw new Error(error.message || 'Cloud request failed');
    return data;
  }

  function applyCloudPayload(data){
    const weekly = data.weekly_budget == null ? null : Number(data.weekly_budget);
    settings = weekly == null || Number.isNaN(weekly) ? null : { weeklyBudget: weekly };
    transactions = Array.isArray(data.transactions) ? data.transactions.map(normalizeTx) : [];
    customCategories = Array.isArray(data.categories)
      ? data.categories.map(c => ({
          id: String(c.id || ('cat-' + Math.random().toString(36).slice(2,8))),
          name: String(c.name || '').trim(),
          color: c.color || CATEGORY_COLORS[0]
        })).filter(c => c.name)
      : [];
    merchantRules = Array.isArray(data.merchant_rules)
      ? data.merchant_rules.map(r => ({
          merchantKey: String(r.merchantKey || r.merchant_key || '').toLowerCase().trim(),
          category: String(r.category || '').trim(),
          label: String(r.label || r.merchantKey || r.merchant_key || '').trim()
        })).filter(r => r.merchantKey && r.category)
      : [];
    companyAliases = Array.isArray(data.company_aliases)
      ? data.company_aliases.map(a => ({
          id: a.id ? String(a.id) : undefined,
          rawKey: String(a.rawKey || a.raw_key || '').toLowerCase().trim(),
          companyName: String(a.companyName || a.company_name || '').trim()
        })).filter(a => a.rawKey && a.companyName)
      : [];
    calendarEvents = Array.isArray(data.calendar_events)
      ? data.calendar_events.map(e => ({
          id: String(e.id || ('evt-' + Math.random().toString(36).slice(2, 9))),
          title: String(e.title || '').trim(),
          notes: String(e.notes || ''),
          startTs: Number(e.startTs || e.start_ts),
          endTs: e.endTs != null || e.end_ts != null ? Number(e.endTs || e.end_ts) : null,
          allDay: !(e.allDay === false || e.all_day === false),
          person: normalizePerson(e.person),
          gcalEventId: e.gcalEventId || e.gcal_event_id || null
        })).filter(e => e.title && Number.isFinite(e.startTs))
      : [];
    gcalCalendarId = data.gcal_calendar_id || null;
  }

    accessCode = localStorage.getItem(CODE_KEY) || '';
    if (!accessCode){
      settings = null;
      transactions = [];
      calendarEvents = [];
      render();
      return;
    }
    try {
      const data = await rpc('unlock_budget', { p_code: accessCode });
      applyCloudPayload(data);
      const cleaned = removeExactDuplicates(transactions);
      if (cleaned.removed > 0){
        transactions = cleaned.kept;
        await saveTransactions();
      }
    } catch (e) {
      authError = e.message || 'Could not unlock budget';
      accessCode = '';
      localStorage.removeItem(CODE_KEY);
      settings = null;
      transactions = [];
    }
    render();

      accessCode = code.trim();
      localStorage.setItem(CODE_KEY, accessCode);
      applyCloudPayload(data);
      // Migrate any leftover local browser data once.
      try {
        const legacyTx = JSON.parse(localStorage.getItem('budget:transactions') || 'null');
        if (Array.isArray(legacyTx) && legacyTx.length && transactions.length === 0){
          transactions = legacyTx.map(normalizeTx);
          await saveTransactions();
        }
      } catch (_) {}
    } catch (e) {
      authError = e.message || 'Could not create budget';
    } finally {
      authBusy = false;
      render();

  function fmt(n){
    const neg = n < 0;
    const v = Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    return (neg ? "-$" : "$") + v;
  }
  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s == null ? '' : s;
    return d.innerHTML;
  }

  function getWeekRange(d){
    const date = new Date(d);
    const day = date.getDay();
    const diffToMonday = (day === 0 ? -6 : 1 - day);
    const monday = new Date(date);
    monday.setHours(0,0,0,0);
    monday.setDate(date.getDate() + diffToMonday);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return {start: monday, end: sunday};
  }
  function fmtRange(start, end){
    const opts = {month:'short', day:'numeric'};
    return start.toLocaleDateString(undefined, opts) + ' – ' + end.toLocaleDateString(undefined, opts);
  }
  function weeksInMonth(date){
    const y = date.getFullYear(), m = date.getMonth();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    return daysInMonth / 7;
  }
  function monthlyFromWeekly(weekly, date){
    return weekly * weeksInMonth(date || new Date());
  }

  async function addTransaction(amount, note){
    transactions.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), amount, note: note || '', ts: Date.now(), source: 'manual' });
    await saveTransactions();
    closeAllModals();

  async function importTransactions(rows, cardLabel){
    const existing = buildDedupeSet(transactions);
    const now = Date.now();
    let added = 0;
    let skipped = 0;
    rows.forEach((r, i) => {
      const card = (r.card || cardLabel || '').trim();
      const key = txDedupeKey(r.date, r.note, card, r.amount);
      if (existing.has(key)){
        skipped += 1;
        return;
      }
      existing.add(key);
      transactions.push({
        id: now + '-' + i + '-' + Math.random().toString(36).slice(2,5),
        amount: r.amount,
        note: r.note,
        ts: r.date.getTime(),
        source: 'statement',
        card
      });
      added += 1;
    });
    if (added > 0) await saveTransactions();
    importResult = { added, skipped };
    closeAllModals();
    render();
  }
  async function deleteTransaction(id){

    await saveTransactions();
    closeAllModals();

  async function rememberMerchant(note, category, keyOverride, labelOverride, opts){
    const skipSave = opts && opts.skipSave;
    const resolved = note ? resolveCompany(note) : null;
    const key = (keyOverride || (resolved && resolved.standardized ? resolved.rawKey : null) || merchantKeyFromNote(note) || '').toLowerCase().trim();
    if (!key || key.length < 3 || key === '__unknown__') return false;
    const label = labelOverride || (resolved && resolved.label) || merchantLabelFromNote(note) || key;
    const idx = merchantRules.findIndex(r => r.merchantKey === key);
    if (idx >= 0){
      merchantRules[idx].category = category;
      merchantRules[idx].label = label || merchantRules[idx].label;
    } else {
      merchantRules.push({ merchantKey: key, category, label });
    }
    if (!skipSave) await saveTaxonomy();
    return true;
  }

  async function recategorizeMerchant(merchantKey, fromCat, toCat, label){
    const key = String(merchantKey || '').toLowerCase().trim();
    const next = String(toCat || '').trim();
    if (!key || !next || next === fromCat){
      merchantRecat = null;
      render();
      return;
    }
    const matchedNotes = [];
    transactions.forEach(t => {
      if (merchantBucketKey(t.note) === key){
        t.categoryOverride = next;
        matchedNotes.push(t.note);
      }
    });
    // Remember every statement variant under this company so future imports auto-tag
    const rawKeys = new Set();
    matchedNotes.forEach(note => {
      const r = resolveCompany(note);
      if (r.rawKey) rawKeys.add(r.rawKey);
      const mk = merchantKeyFromNote(note);
      if (mk) rawKeys.add(mk);
    });
    companyAliases.forEach(a => {
      if (companySlug(a.companyName) === key && a.rawKey) rawKeys.add(a.rawKey);
    });
    for (const rk of rawKeys){
      await rememberMerchant('', next, rk, label, { skipSave: true });
    }
    if (!rawKeys.size) await rememberMerchant('', next, key, label, { skipSave: true });
    await saveTaxonomy();
    expandedCats.add(next);
    expandedMerchants.add(merchantExpandKey(next, key));
    if (fromCat) expandedMerchants.delete(merchantExpandKey(fromCat, key));
    merchantRecat = null;
    await saveTransactions();
    render();
  }

  async function deleteMerchantRule(merchantKey){
    const key = String(merchantKey || '').toLowerCase().trim();
    const aliasRawKeys = new Set(
      companyAliases
        .filter(a => companySlug(a.companyName) === key || a.rawKey === key)
        .map(a => a.rawKey)
    );
    merchantRules = merchantRules.filter(r => {
      if (r.merchantKey === key) return false;
      if (aliasRawKeys.has(r.merchantKey)) return false;
      if (companySlug(r.label) === key) return false;
      return true;
    });
    await saveTaxonomy();
    render();
  }

  function merchantBucketKey(note){

  function buildCategoryTree(){
    const map = new Map();
    allCategories().forEach(c => {
      map.set(c.name, {
        name: c.name,
        color: c.color,
        builtin: !!c.builtin,
        id: c.id || null,
        total: 0,
        merchants: new Map()
      });
    });

    function ensureMerchant(catNode, key, label, standardized){
      if (!catNode.merchants.has(key)){
        catNode.merchants.set(key, {
          key,
          label: label || (key === '__unknown__' ? 'Unknown place' : key),
          standardized: !!standardized,
          total: 0,
          remembered: false,
          txs: []
        });
      }
      return catNode.merchants.get(key);
    }

    transactions.forEach(t => {
      const catName = getCategory(t);
      if (!map.has(catName)){
        map.set(catName, {
          name: catName,
          color: catColor(catName),
          builtin: false,
          id: null,
          total: 0,
          merchants: new Map()
        });
      }
      const catNode = map.get(catName);
      const resolved = resolveCompany(t.note);
      const key = resolved.key || '__unknown__';
      const label = resolved.label || (key === '__unknown__' ? 'Unknown place' : key);
      const m = ensureMerchant(catNode, key, label, resolved.standardized);
      if (resolved.standardized){
        m.label = resolved.label;
        m.standardized = true;
      } else if (!m.label || m.label === key){
        m.label = label;
      }
      m.txs.push(t);
      m.total += Number(t.amount) || 0;
      catNode.total += Number(t.amount) || 0;
    });

    merchantRules.forEach(r => {
      if (!map.has(r.category)){
        map.set(r.category, {
          name: r.category,
          color: catColor(r.category),
          builtin: false,
          id: null,
          total: 0,
          merchants: new Map()
        });
      }
      const catNode = map.get(r.category);
      // Prefer company bucket when this rule's key is an alias raw_key
      const alias = companyAliases.find(a => a.rawKey === r.merchantKey);
      const key = alias ? (companySlug(alias.companyName) || r.merchantKey) : r.merchantKey;
      const label = alias ? alias.companyName : (r.label || r.merchantKey);
      const m = ensureMerchant(catNode, key, label, !!alias);
      m.remembered = true;
      if (alias) m.label = alias.companyName;
      else if (r.label) m.label = r.label;
    });

    return [...map.values()]
      .map(cat => ({
        ...cat,
        merchants: [...cat.merchants.values()]
          .map(m => ({
            ...m,
            txs: m.txs.slice().sort((a, b) => b.ts - a.ts)
          }))
          .sort((a, b) => b.total - a.total || a.label.localeCompare(b.label))
      }))
      .sort((a, b) => b.total - a.total || a.name.localeCompare(b.name));
  }

  function merchantExpandKey(catName, merchantKey){
    return catName + '::' + merchantKey;
  }

  function buildCompanyList(){
    const map = new Map();
    transactions.forEach(t => {
      const resolved = resolveCompany(t.note);
      const key = resolved.key || '__unknown__';
      if (!map.has(key)){
        map.set(key, {
          key,
          label: resolved.label || (key === '__unknown__' ? 'Unknown place' : key),
          standardized: !!resolved.standardized,
          total: 0,
          txs: [],
          cats: new Map()
        });
      }
      const node = map.get(key);
      if (resolved.standardized){
        node.label = resolved.label;
        node.standardized = true;
      }
      node.txs.push(t);
      node.total += Number(t.amount) || 0;
      const cat = getCategory(t);
      node.cats.set(cat, (node.cats.get(cat) || 0) + (Number(t.amount) || 0));
    });
    return [...map.values()]
      .map(c => ({
        ...c,
        txs: c.txs.slice().sort((a, b) => b.ts - a.ts),
        topCat: [...c.cats.entries()].sort((a, b) => b[1] - a[1]).map(e => e[0])[0] || 'Other'
      }))
      .sort((a, b) => b.total - a.total || a.label.localeCompare(b.label));
  }

  function weekSpend(now){
    const {start, end} = getWeekRange(now);
    return transactions.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime());
  }
  function monthSpend(now){
    const y = now.getFullYear(), m = now.getMonth();
    return transactions.filter(t => { const d = new Date(t.ts); return d.getFullYear() === y && d.getMonth() === m; });
  }
  function monthSpendForOffset(offset, now){
    const ref = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const y = ref.getFullYear(), m = ref.getMonth();
    return transactions.filter(t => { const d = new Date(t.ts); return d.getFullYear() === y && d.getMonth() === m; });
  }
  function weeksOverlappingMonth(monthOffset, now){
    const ref = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
    const firstDay = new Date(ref.getFullYear(), ref.getMonth(), 1);
    const lastDay = new Date(ref.getFullYear(), ref.getMonth() + 1, 0);
    lastDay.setHours(23,59,59,999);
    const weeks = [];
    let cursor = getWeekRange(firstDay).start;
    while (cursor.getTime() <= lastDay.getTime()){
      const {start, end} = getWeekRange(cursor);
      const total = transactions.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime()).reduce((s,t)=>s+t.amount,0);
      weeks.push({start, end, total});
      cursor = new Date(start);
      cursor.setDate(cursor.getDate() + 7);
    }
    return weeks;
  }
  function weeksForRange(view, now){
    if (view === 'week'){
      const {start, end} = getWeekRange(now);
      const total = transactions.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime()).reduce((s,t)=>s+t.amount,0);
      return [{start, end, total}];
    }
    if (view === 'month') return weeksOverlappingMonth(0, now);
    if (view === 'lastMonth') return weeksOverlappingMonth(-1, now);
    if (view === 'last3'){
      const combined = [];
      [-2, -1, 0].forEach(offset => {
        weeksOverlappingMonth(offset, now).forEach(w => {
          if (!combined.some(c => c.start.getTime() === w.start.getTime())) combined.push(w);
        });
      });
      combined.sort((a,b) => a.start - b.start);
      return combined;
    }
    return weeksOverlappingMonth(0, now);
  }

  function dateKeyFromValue(d){
    const dt = d instanceof Date ? d : new Date(d);
    if (isNaN(dt.getTime())) return '';
    const y = dt.getFullYear();
    const m = String(dt.getMonth() + 1).padStart(2, '0');
    const day = String(dt.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function normalizeNote(note){
    return String(note || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function normalizeCard(card){
    return String(card || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }

  function normalizeAmount(amount){
    const n = Number(amount);
    if (!Number.isFinite(n)) return '0.00';
    return n.toFixed(2);
  }

  function txDedupeKey(dateOrTs, note, card, amount){
    return [
      dateKeyFromValue(dateOrTs),
      normalizeNote(note),
      normalizeCard(card),
      normalizeAmount(amount)
    ].join('|');
  }

  function buildDedupeSet(list){
    const set = new Set();
    (list || []).forEach(t => set.add(txDedupeKey(t.ts, t.note, t.card, t.amount)));
    return set;
  }

  function removeExactDuplicates(list){
    const seen = new Set();
    const kept = [];
    let removed = 0;
    // Keep the oldest copy of each exact match.
    const ordered = [...list].sort((a, b) => a.ts - b.ts || String(a.id).localeCompare(String(b.id)));
    ordered.forEach(t => {
      const key = txDedupeKey(t.ts, t.note, t.card, t.amount);
      if (seen.has(key)){ removed += 1; return; }
      seen.add(key);
      kept.push(t);
    });
    kept.sort((a, b) => b.ts - a.ts);
    return { kept, removed };
  }

  function markImportDuplicates(rows, cardLabel){
    const existing = buildDedupeSet(transactions);
    const seenInFile = new Set();
    let duplicateCount = 0;
    rows.forEach(r => {
      const card = (r.card || cardLabel || '').trim();
      const key = txDedupeKey(r.date, r.note, card, r.amount);
      const isDup = existing.has(key) || seenInFile.has(key);
      r.duplicate = isDup;
      if (isDup){
        r.selected = false;
        duplicateCount += 1;
      }
      seenInFile.add(key);
    });
    return duplicateCount;
  }

  function openModal(kind){
    modalState = kind; entryAmount = "0"; entryNote = "";
    if (kind === 'import'){ importPhase = 'select'; importRows = []; importError = ''; importCardLabel = ''; importResult = null; }
    render();
  }
  function closeAllModals(){ modalState = null; detailState = null; render(); }
  function openDetail(type, id){
    if (type === 'chart') chartView = 'month';
    detailState = {type, id};

  function pressKey(k){
    if (k === 'back') entryAmount = entryAmount.length > 1 ? entryAmount.slice(0,-1) : "0";
    else if (k === '.'){ if (!entryAmount.includes('.')) entryAmount += '.'; }
    else {
      if (entryAmount === "0") entryAmount = k;
      else if (!(entryAmount.includes('.') && entryAmount.split('.')[1].length >= 2)) entryAmount += k;
    }
    render();
  }

  function statusInfo(weekTotal, weeklyBudget, now){
    const {start, end} = getWeekRange(now);
    const elapsed = (now.getTime() - start.getTime()) / (end.getTime() - start.getTime());
    const expected = weeklyBudget * Math.min(Math.max(elapsed, 0), 1);
    const diff = weekTotal - expected;
    const threshold = weeklyBudget * 0.1;
    if (diff < -threshold) return { label: 'Ahead', emoji: '😌', color: 'var(--good)' };
    if (diff > threshold) return { label: 'Behind', emoji: '😬', color: 'var(--danger)' };
    return { label: 'On Track', emoji: '👍', color: 'var(--warn)' };
  }

  function weekBarInfo(total, weeklyBudget){
    const diff = total - weeklyBudget;
    if (diff > 100) return { color: 'var(--danger)', kind: 'deficit', amount: diff };
    if (diff < -100) return { color: 'var(--good)', kind: 'surplus', amount: -diff };
    return { color: 'var(--neutral)', kind: null, amount: 0 };
  }

  // ---- CSV parsing ----
  function findField(fields, candidates){
    const lower = fields.map(f => f.toLowerCase().trim());
    for (const c of candidates){ const idx = lower.findIndex(f => f.includes(c)); if (idx !== -1) return fields[idx]; }
    return null;
  }
  function parseAmountStr(raw){
    if (raw === undefined || raw === null) return null;
    let s = String(raw).trim();
    if (s === '') return null;
    let neg = false;
    if (s.startsWith('(') && s.endsWith(')')){ neg = true; s = s.slice(1,-1); }
    if (s.startsWith('-')){ neg = true; s = s.slice(1); }
    s = s.replace(/[$,]/g, '').trim();
    const num = parseFloat(s);
    if (isNaN(num)) return null;
    return neg ? -num : num;
  }
  function titleCaseName(s){
    return String(s || '').trim().toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
  }

  function findExactField(fields, candidates){
    const lower = fields.map(f => f.toLowerCase().trim());
    for (const c of candidates){
      const idx = lower.indexOf(c);
      if (idx !== -1) return fields[idx];
    }
    return null;
  }

  function accountTail(raw){
    const digits = String(raw || '').replace(/\D/g, '');
    if (!digits) return '';
    return digits.length >= 5 ? digits.slice(-5) : digits.slice(-4);
  }

  function cardLabelFromRow(row, memberField, accountField){
    const member = memberField ? titleCaseName(row[memberField]) : '';
    const tail = accountField ? accountTail(row[accountField]) : '';
    if (member && tail) return `${member} · ${tail}`;
    if (member) return member;
    if (tail) return `•••• ${tail}`;
    return '';
  }

  function guessCardNameFromFilename(filename){
    let name = (filename || '').replace(/\.[^/.]+$/, '');
    name = name.replace(/[_-]+/g, ' ');
    name = name.replace(/\b(export|transactions?|activity|statement|history|download|csv|data|copy)\b/gi, '');
    name = name.replace(/\s+/g, ' ').trim();
    if (!name) return '';
    return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  function detectDefaultCardName(fields, dataRows, filename, memberField, accountField){
    // Prefer a shared label only when every row maps to the same card.
    if (memberField || accountField){
      const labels = dataRows
        .map(r => cardLabelFromRow(r, memberField, accountField))
        .filter(Boolean);
      const unique = [...new Set(labels)];
      if (unique.length === 1) return unique[0];
      if (unique.length > 1) return ''; // mixed cards — keep per-row values
    }
    const guessed = guessCardNameFromFilename(filename);
    return guessed || '';
  }

  function parseStatementCSV(text, filename){
    if (typeof Papa === 'undefined') return {error: 'CSV parser failed to load. Check your connection and try again.'};
    const parsed = Papa.parse(text, {header: true, skipEmptyLines: true});
    if (!parsed.meta || !parsed.meta.fields || parsed.meta.fields.length === 0)
      return {error: "Couldn't read that file as a CSV. Export your statement as CSV from your card's website and try again."};
    const fields = parsed.meta.fields;
    const dateField = findField(fields, ['transaction date', 'trans date', 'post date', 'date']);
    const descField = findField(fields, ['description', 'merchant', 'payee', 'memo']);
    const amountField = findField(fields, ['amount']);
    const debitField = findField(fields, ['debit']);
    const creditField = findField(fields, ['credit']);
    const memberField = findExactField(fields, ['card member', 'cardholder', 'card holder', 'card name'])
      || findField(fields, ['card member', 'cardholder', 'card holder']);
    const accountField = findExactField(fields, ['account #', 'account number', 'card number', 'account'])
      || findField(fields, ['account #', 'account number', 'card ending', 'last 4']);
    if (!dateField || !descField || (!amountField && !debitField && !creditField))
      return {error: "Couldn't find date, description, and amount columns in that file. Expected a CSV with columns like Date, Description, and Amount."};
    const rows = [];
    for (const row of parsed.data){
      const dateVal = new Date(row[dateField]);
      if (isNaN(dateVal.getTime())) continue;
      let amount = null;
      if (amountField) amount = parseAmountStr(row[amountField]);
      else {
        const debit = parseAmountStr(row[debitField]);
        const credit = parseAmountStr(row[creditField]);
        if (debit) amount = Math.abs(debit); else if (credit) amount = -Math.abs(credit);
      }
      if (amount === null) continue;
      const desc = (row[descField] || '').trim();
      const card = cardLabelFromRow(row, memberField, accountField);
      rows.push({ date: dateVal, note: desc, amount, card, selected: amount > 0 });
    }
    if (rows.length === 0) return {error: 'No valid transaction rows found in that file.'};
    rows.sort((a,b) => b.date - a.date);
    const cardName = detectDefaultCardName(fields, parsed.data, filename, memberField, accountField);
    return {rows, cardName, hasPerRowCard: rows.some(r => r.card)};
  }

  function handleStatementFile(file){
    if (!file) return;
    if (!/\.csv$/i.test(file.name) && file.type !== 'text/csv'){
      importError = "That doesn't look like a CSV file. Export your statement as CSV from your card's website.";
      render();
      return;
    }
    const reader = new FileReader();
    reader.onload = (evt) => {
      const result = parseStatementCSV(evt.target.result, file.name);
      if (result.error) importError = result.error;
      else {
        importRows = result.rows;
        importCardLabel = result.cardName || '';
        markImportDuplicates(importRows, importCardLabel);
        importPhase = 'preview';
      }
      render();
    };
    reader.onerror = () => { importError = 'Could not read that file. Try exporting it again.'; render(); };
    reader.readAsText(file);
  }

  function gaugeCardHTML(weekTotal, monthTotal, weekPct, monthPct, status, now){
    const r = 78;
    const c = 2 * Math.PI * r;
    const off = c * (1 - weekPct);
    const weekRemaining = settings.weeklyBudget - weekTotal;
    const over = weekRemaining < 0;
    const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
    const monthColor = monthPct < 0.7 ? 'var(--good)' : (monthPct < 1 ? 'var(--warn)' : 'var(--danger)');

    const {end: weekEnd} = getWeekRange(now);
    const daysLeftWeek = Math.max(1, Math.ceil((weekEnd.getTime() - now.getTime()) / (24*60*60*1000)));
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const daysLeftMonth = Math.max(1, daysInMonth - now.getDate() + 1);
    const monthRemaining = monthlyBudget - monthTotal;
    const dailyWeek = Math.max(0, weekRemaining) / daysLeftWeek;
    const dailyMonth = Math.max(0, monthRemaining) / daysLeftMonth;
    const amountText = fmt(Math.abs(weekRemaining));
    const amountLen = amountText.length;
    const amountSizeClass = amountLen > 11 ? 'is-xl' : (amountLen > 9 ? 'is-long' : '');

    return `
      <div class="card gauge-card" data-action="open-detail" data-detail="monthly" tabindex="0" role="button" aria-label="View monthly and weekly breakdown">
        <div class="status-badge" style="color:${status.color}"><span class="status-emoji">${status.emoji}</span> ${status.label}</div>
        <div class="gauge-wrap">
          <svg viewBox="0 0 200 200">
            <circle class="ring-track" cx="100" cy="100" r="${r}" stroke="rgba(255,255,255,0.14)" stroke-width="14"></circle>
            <circle class="ring-fill" cx="100" cy="100" r="${r}" stroke="${over ? 'var(--danger)' : 'var(--good)'}" stroke-width="14" stroke-dasharray="${c}" stroke-dashoffset="${off}"></circle>
          </svg>
          <div class="gauge-center">
            <div class="gauge-amount ${amountSizeClass}">${amountText}</div>
            <div class="gauge-label">${over ? 'over this week' : 'left this week'}</div>
          </div>
        </div>
        <div class="gauge-caption" style="margin-bottom:14px;">${fmt(weekTotal)} of ${fmt(settings.weeklyBudget)} spent this week</div>
        <div class="gauge-bar-wrap">
          <div class="gauge-bar-label"><span>This month</span><span>${fmt(monthTotal)} / ${fmt(monthlyBudget)}</span></div>
          <div class="gauge-bar-track"><div class="gauge-bar-fill" style="width:${monthPct*100}%; background:${monthColor}"></div></div>
        </div>
        <div class="daily-stats-row">
          <div class="daily-stat">
            <div class="daily-stat-label">Per day · week</div>
            <div class="daily-stat-value" style="color:${over ? 'var(--danger)' : 'var(--ink-on-dark)'}">${fmt(dailyWeek)}</div>
            <div class="daily-stat-sub">${daysLeftWeek} day${daysLeftWeek===1?'':'s'} left</div>
          </div>
          <div class="daily-stat">
            <div class="daily-stat-label">Per day · month</div>
            <div class="daily-stat-value" style="color:${monthRemaining < 0 ? 'var(--danger)' : 'var(--ink-on-dark)'}">${fmt(dailyMonth)}</div>
            <div class="daily-stat-sub">${daysLeftMonth} day${daysLeftMonth===1?'':'s'} left</div>
          </div>
        </div>
      </div>
    `;
  }

  function categoriesCardHTML(mTx){
    const totals = {};
    mTx.forEach(t => { const c = getCategory(t); totals[c] = (totals[c] || 0) + t.amount; });
    const monthAll = mTx.reduce((s,t) => s + t.amount, 0);
    const ranked = Object.entries(totals).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).slice(0,3);
    return `
      <div class="card cat-card" data-action="open-detail" data-detail="categories" tabindex="0" role="button" aria-label="View all spend categories">
        <div class="cat-title">Top categories this month</div>
        ${ranked.length === 0 ? '<div class="cat-empty">No spend logged this month yet.</div>' :
          ranked.map(([name, total]) => {
            const pct = monthAll > 0 ? Math.round((total/monthAll)*100) : 0;
            return `
              <div class="cat-row" data-action="open-category" data-cat="${escapeHtml(name)}">
                <div class="cat-circle" style="background:${catColor(name)}">${pct}%</div>
                <div class="cat-info">

  function chartCardHTML(now){
    const weeks = weeksOverlappingMonth(0, now);
    const weeklyBudget = settings.weeklyBudget;
    const w = 280, h = 130, padX = 10, padTop = 24, padBottom = 22;
    const plotH = h - padTop - padBottom;
    const max = Math.max(...weeks.map(wk => wk.total), weeklyBudget) * 1.15 || 1;
    const slot = (w - padX*2) / weeks.length;
    const barWidth = slot * 0.5;
    const bars = weeks.map((wk, i) => {
      const x = padX + i*slot + (slot - barWidth)/2;
      const barH = Math.max((wk.total/max) * plotH, 3);
      const y = h - padBottom - barH;
      const info = weekBarInfo(wk.total, weeklyBudget);
      return {x, y, barH, wk, info};
    });
    const budgetY = h - padBottom - ((weeklyBudget/max) * plotH);
    const svgBars = bars.map(b => `
      <rect x="${b.x.toFixed(1)}" y="${b.y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${b.barH.toFixed(1)}" rx="4" fill="${b.info.kind === 'deficit' ? 'url(#overHatch)' : b.info.color}"></rect>
      ${b.info.kind === 'deficit' ? `<rect x="${b.x.toFixed(1)}" y="${b.y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${b.barH.toFixed(1)}" rx="4" fill="none" stroke="${b.info.color}" stroke-width="1.5"></rect>` : ''}
      ${b.info.kind ? `<text x="${(b.x + barWidth/2).toFixed(1)}" y="${(b.y - 6).toFixed(1)}" text-anchor="middle" font-size="9" font-family="'IBM Plex Mono', monospace" fill="${b.info.color}">${b.info.kind === 'surplus' ? '+' : '-'}$${Math.round(b.info.amount)}</text>` : ''}
      <text x="${(b.x + barWidth/2).toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="8" fill="var(--ink-on-dark-soft)">${b.wk.start.toLocaleDateString(undefined,{month:'numeric',day:'numeric'})}</text>
    `).join('');
    return `
      <div class="card chart-card" data-action="open-detail" data-detail="chart" tabindex="0" role="button" aria-label="View week over week spend">
        <div class="chart-title">Week over week spend</div>
        <div class="chart-sub">This month · grey = on track (±$100) · tap to look back</div>
        <div class="chart-svg-wrap">
          <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
            <defs>
              <pattern id="overHatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                <rect width="7" height="7" fill="var(--danger)"></rect>
                <line x1="0" y1="0" x2="0" y2="7" stroke="rgba(255,255,255,0.4)" stroke-width="3"></line>
              </pattern>
            </defs>
            <line x1="${padX}" y1="${budgetY.toFixed(1)}" x2="${w-padX}" y2="${budgetY.toFixed(1)}" stroke="var(--ink-on-dark-soft)" stroke-width="1" stroke-dasharray="3,3"></line>
            ${svgBars}
          </svg>
        </div>
      </div>
    `;
  }

  function dateKeyFromTs(ts){
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function ymdLocal(d){
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function timeStrFromTs(ts){
    const d = new Date(ts);
    return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function combineDateAndTime(dateKey, timeStr){
    const [y, m, d] = String(dateKey || '').split('-').map(Number);
    const parts = String(timeStr || '09:00').split(':');
    const hh = Number(parts[0]) || 0;
    const mm = Number(parts[1]) || 0;
    return new Date(y, m - 1, d, hh, mm, 0, 0).getTime();
  }

  function localDateTimeForGcal(d){
    return ymdLocal(d) + 'T' + timeStrFromTs(d.getTime()) + ':00';
  }

  function formatEventTime(ev){
    if (ev.allDay !== false) return 'All day';
    const opts = { hour: 'numeric', minute: '2-digit' };
    const start = new Date(ev.startTs).toLocaleTimeString(undefined, opts);
    if (!ev.endTs) return start;
    const end = new Date(ev.endTs).toLocaleTimeString(undefined, opts);
    if (ev.endTs <= ev.startTs) return start;
    return start + ' – ' + end;
  }

  function ensureGcalTokenClient(){
    if (gcalTokenClient) return gcalTokenClient;
    if (!cfg.googleClientId) throw new Error('Add googleClientId to config.js (Google OAuth Web client).');
    if (!window.google || !google.accounts || !google.accounts.oauth2){
      throw new Error('Google sign-in still loading — try again in a second.');
    }
    gcalTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: cfg.googleClientId,
      scope: GCAL_SCOPES,
      callback: () => {}
    });
    return gcalTokenClient;
  }

  function requestGcalAccessToken(prompt){
    return new Promise((resolve, reject) => {
      try {
        const client = ensureGcalTokenClient();
        client.callback = (resp) => {
          if (resp.error){
            reject(new Error(resp.error));
            return;
          }
          gcalAccessToken = resp.access_token;
          const expiresIn = Number(resp.expires_in || 3600);
          gcalTokenExpiresAt = Date.now() + Math.max(60, expiresIn - 60) * 1000;
          resolve(gcalAccessToken);
        };
        client.requestAccessToken({ prompt: prompt == null ? '' : prompt });
      } catch (e) {
        reject(e);
      }
    });
  }

  async function getGcalToken(forcePrompt){
    if (!forcePrompt && gcalAccessToken && Date.now() < gcalTokenExpiresAt) return gcalAccessToken;
    try {
      return await requestGcalAccessToken(forcePrompt ? 'consent' : '');
    } catch (e) {
      // Silent refresh failed — ask for consent
      return await requestGcalAccessToken('consent');
    }
  }

  async function gcalFetch(path, opts){
    const token = await getGcalToken(false);
    const res = await fetch('https://www.googleapis.com/calendar/v3' + path, {
      ...opts,
      headers: {
        'Authorization': 'Bearer ' + token,
        'Content-Type': 'application/json',
        ...(opts && opts.headers ? opts.headers : {})
      }
    });
    if (res.status === 401){
      gcalAccessToken = null;
      const token2 = await getGcalToken(true);
      const res2 = await fetch('https://www.googleapis.com/calendar/v3' + path, {
        ...opts,
        headers: {
          'Authorization': 'Bearer ' + token2,
          'Content-Type': 'application/json',
          ...(opts && opts.headers ? opts.headers : {})
        }
      });
      if (!res2.ok){
        const t = await res2.text();
        throw new Error(t || ('Google Calendar error ' + res2.status));
      }
      if (res2.status === 204) return null;
      return res2.json();
    }
    if (!res.ok){
      const t = await res.text();
      throw new Error(t || ('Google Calendar error ' + res.status));
    }
    if (res.status === 204) return null;
    return res.json();
  }

  function eventToGcalBody(ev){
    const person = normalizePerson(ev.person);
    const meta = personMeta(person);
    const start = new Date(ev.startTs);
    const end = ev.endTs ? new Date(ev.endTs) : new Date(ev.startTs + (ev.allDay === false ? 60 * 60 * 1000 : 24 * 60 * 60 * 1000));
    const notes = [ev.notes || '', 'Person: ' + person, 'Home Hub id: ' + ev.id].filter(Boolean).join('\n');
    const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'America/Los_Angeles';
    const body = {
      summary: ev.title,
      description: notes,
      colorId: meta.gcalColorId,
      extendedProperties: {
        private: {
          homeHubId: ev.id,
          person: person
        }
      }
    };
    if (ev.allDay === false){
      body.start = { dateTime: localDateTimeForGcal(start), timeZone: tz };
      body.end = { dateTime: localDateTimeForGcal(end), timeZone: tz };
    } else {
      body.start = { date: ymdLocal(start) };
      body.end = { date: ymdLocal(end) };
    }
    return body;
  }

  function gcalItemToLocal(item){
    const priv = (item.extendedProperties && item.extendedProperties.private) || {};
    const homeHubId = priv.homeHubId || null;
    let person = normalizePerson(priv.person);
    if (!priv.person && item.description){
      const m = String(item.description).match(/Person:\s*(Jared|Tessa|Poppy|Griffy|Family)/i);
      if (m) person = normalizePerson(m[1]);
      else {
        // Infer from Google colorId
        const byColor = PEOPLE.find(p => p.gcalColorId === String(item.colorId));
        if (byColor) person = byColor.id;
      }
    }
    const startStr = (item.start && (item.start.date || item.start.dateTime)) || '';
    const endStr = (item.end && (item.end.date || item.end.dateTime)) || '';
    let startTs, endTs, allDay = true;
    if (item.start && item.start.date){
      const [y, m, d] = startStr.split('-').map(Number);
      startTs = new Date(y, m - 1, d, 12, 0, 0, 0).getTime();
      if (endStr){
        const [ey, em, ed] = endStr.split('-').map(Number);
        endTs = new Date(ey, em - 1, ed, 12, 0, 0, 0).getTime();
      } else {
        endTs = startTs + 24 * 60 * 60 * 1000;
      }
    } else {
      startTs = new Date(startStr).getTime();
      endTs = endStr ? new Date(endStr).getTime() : startTs + 60 * 60 * 1000;
      allDay = false;
    }
    let notes = String(item.description || '');
    notes = notes.replace(/\n?Person:\s*(Jared|Tessa|Poppy|Griffy|Family)/ig, '');
    notes = notes.replace(/\n?Home Hub id:\s*\S+/ig, '').trim();
    return {
      id: homeHubId || ('gcal-' + item.id),
      title: String(item.summary || 'Untitled').trim() || 'Untitled',
      notes,
      startTs,
      endTs,
      allDay,
      person,
      gcalEventId: item.id
    };
  }

  async function ensureHomeHubCalendar(){
    if (gcalCalendarId){
      try {
        await gcalFetch('/calendars/' + encodeURIComponent(gcalCalendarId));
        return gcalCalendarId;
      } catch (_) {
        gcalCalendarId = null;
      }
    }
    const list = await gcalFetch('/users/me/calendarList');
    const existing = (list.items || []).find(c => c.summary === GCAL_CAL_NAME);
    if (existing){
      await saveGcalCalendarId(existing.id);
      return existing.id;
    }
    const created = await gcalFetch('/calendars', {
      method: 'POST',
      body: JSON.stringify({ summary: GCAL_CAL_NAME, description: 'Home Hub household calendar' })
    });
    await saveGcalCalendarId(created.id);
    return created.id;
  }

  async function pushEventToGcal(ev){
    if (!gcalCalendarId && !cfg.googleClientId) return ev;
    const calId = await ensureHomeHubCalendar();
    const body = eventToGcalBody(ev);
    if (ev.gcalEventId){
      try {
        const updated = await gcalFetch(
          '/calendars/' + encodeURIComponent(calId) + '/events/' + encodeURIComponent(ev.gcalEventId),
          { method: 'PUT', body: JSON.stringify(body) }
        );
        ev.gcalEventId = updated.id;
        return ev;
      } catch (_) {
        // recreate if missing remotely
      }
    }
    const created = await gcalFetch(
      '/calendars/' + encodeURIComponent(calId) + '/events',
      { method: 'POST', body: JSON.stringify(body) }
    );
    ev.gcalEventId = created.id;
    return ev;
  }

  async function deleteEventFromGcal(ev){
    if (!ev || !ev.gcalEventId || !gcalCalendarId) return;
    try {
      await gcalFetch(
        '/calendars/' + encodeURIComponent(gcalCalendarId) + '/events/' + encodeURIComponent(ev.gcalEventId),
        { method: 'DELETE' }
      );
    } catch (e) {
      console.warn('Google Calendar delete failed', e);
    }
  }

  async function pullFromGcal(){
    const calId = await ensureHomeHubCalendar();
    const timeMin = new Date();
    timeMin.setMonth(timeMin.getMonth() - 2);
    const timeMax = new Date();
    timeMax.setMonth(timeMax.getMonth() + 6);
    const qs = new URLSearchParams({
      singleEvents: 'true',
      orderBy: 'startTime',
      timeMin: timeMin.toISOString(),
      timeMax: timeMax.toISOString(),
      maxResults: '250'
    });
    const data = await gcalFetch('/calendars/' + encodeURIComponent(calId) + '/events?' + qs.toString());
    const remote = (data.items || []).filter(i => i.status !== 'cancelled').map(gcalItemToLocal);
    const byGcal = new Map(calendarEvents.filter(e => e.gcalEventId).map(e => [e.gcalEventId, e]));
    const byId = new Map(calendarEvents.map(e => [e.id, e]));
    const merged = [];
    const seenLocal = new Set();

    remote.forEach(r => {
      const existing = byGcal.get(r.gcalEventId) || byId.get(r.id);
      if (existing){
        merged.push({
          ...existing,
          title: r.title,
          notes: r.notes,
          startTs: r.startTs,
          endTs: r.endTs,
          allDay: r.allDay,
          person: r.person,
          gcalEventId: r.gcalEventId
        });
        seenLocal.add(existing.id);
      } else {
        merged.push(r);
      }
    });

    // Keep local-only events that never made it to GCal yet, then push them
    calendarEvents.forEach(e => {
      if (!seenLocal.has(e.id) && !e.gcalEventId) merged.push(e);
    });

    calendarEvents = merged;
    // Push any local events missing a remote id
    for (const ev of calendarEvents){
      if (!ev.gcalEventId){
        try { await pushEventToGcal(ev); } catch (err) { console.warn(err); }
      }
    }
    await saveCalendarEvents();
  }

  async function connectGoogleCalendar(){
    gcalBusy = true; gcalStatus = ''; calendarError = ''; render();
    try {
      await getGcalToken(true);
      await ensureHomeHubCalendar();
      await pullFromGcal();
      gcalStatus = 'Synced with Google Calendar';
    } catch (e) {
      console.error(e);
      calendarError = e.message || 'Could not connect Google Calendar';
      gcalStatus = '';
    } finally {
      gcalBusy = false;
      render();
    }
  }

  async function syncGoogleCalendar(){
    if (!cfg.googleClientId){
      calendarError = 'Add googleClientId to config.js first.';
      render();
      return;
    }
    gcalBusy = true; calendarError = ''; render();
    try {
      await getGcalToken(false);
      await pullFromGcal();
      gcalStatus = 'Synced just now';
    } catch (e) {
      console.error(e);
      calendarError = e.message || 'Sync failed';
    } finally {
      gcalBusy = false;
      render();
    }
  }

  async function disconnectGoogleCalendar(){
    if (gcalAccessToken && window.google && google.accounts && google.accounts.oauth2){
      try { google.accounts.oauth2.revoke(gcalAccessToken); } catch (_) {}
    }
    gcalAccessToken = null;
    gcalTokenExpiresAt = 0;

    render();

  function parseDateKey(key){
    const [y, m, d] = String(key || '').split('-').map(Number);
    if (!y || !m || !d) return null;
    return new Date(y, m - 1, d, 12, 0, 0, 0);
  }

  function startOfMonth(d){
    return new Date(d.getFullYear(), d.getMonth(), 1);
  }

  function ensureCalendarCursor(now){
    if (!calendarCursor) calendarCursor = startOfMonth(now || new Date());
    return calendarCursor;
  }

  function eventsForDay(key){
    return calendarEvents
      .filter(e => dateKeyFromTs(e.startTs) === key)
      .sort((a, b) => a.startTs - b.startTs || a.title.localeCompare(b.title));
  }

  function spendForDay(key){
    return transactions
      .filter(t => dateKeyFromTs(t.ts) === key)
      .reduce((s, t) => s + (Number(t.amount) || 0), 0);
  }

  function googleCalendarUrl(ev){
    // Fallback deep-link if not connected yet
    const start = new Date(ev.startTs);
    const end = ev.endTs ? new Date(ev.endTs) : new Date(start.getTime() + (ev.allDay === false ? 60 * 60 * 1000 : 24 * 60 * 60 * 1000));
    function ymd(d){
      return d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
    }
    function ymdHis(d){
      return ymd(d) + 'T' + String(d.getHours()).padStart(2, '0') + String(d.getMinutes()).padStart(2, '0') + '00';
    }
    const dates = ev.allDay === false ? (ymdHis(start) + '/' + ymdHis(end)) : (ymd(start) + '/' + ymd(end));
    const params = new URLSearchParams({
      action: 'TEMPLATE',
      text: ev.title || 'Home Hub',
      dates,
      details: ((ev.notes || '') + '\nPerson: ' + normalizePerson(ev.person) + '\n\nAdded from Home Hub').trim()
    });
    return 'https://calendar.google.com/calendar/render?' + params.toString();
  }

  async function upsertCalendarEvent(draft){
    const title = String(draft.title || '').trim();
    const day = parseDateKey(draft.dateKey);
    const person = normalizePerson(draft.person);
    if (!title || !day){
      calendarError = 'Add a title and pick a day';
      render();
      return;
    }
    const allDay = draft.allDay !== false;
    let startTs;
    let endTs;
    if (allDay){
      startTs = day.getTime();
      endTs = startTs + 24 * 60 * 60 * 1000;
    } else {
      const startTime = draft.startTime || '09:00';
      let endTime = draft.endTime || '';
      startTs = combineDateAndTime(draft.dateKey, startTime);
      if (!endTime){
        endTs = startTs + 60 * 60 * 1000;
      } else {
        endTs = combineDateAndTime(draft.dateKey, endTime);
        if (endTs <= startTs) endTs = startTs + 60 * 60 * 1000;
      }
    }
    let ev;
    if (draft.id){
      const idx = calendarEvents.findIndex(e => e.id === draft.id);
      if (idx >= 0){
        calendarEvents[idx] = {
          ...calendarEvents[idx],
          title,
          notes: String(draft.notes || ''),
          startTs,
          endTs,
          allDay,
          person
        };
        ev = calendarEvents[idx];
      }
    } else {
      ev = {
        id: 'evt-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        title,
        notes: String(draft.notes || ''),
        startTs,
        endTs,
        allDay,
        person,
        gcalEventId: null
      };
      calendarEvents.push(ev);
    }
    calendarDraft = null;
    selectedCalDay = draft.dateKey;
    if (gcalCalendarId || (cfg.googleClientId && gcalAccessToken)){
      try {
        await pushEventToGcal(ev);
      } catch (e) {
        console.warn('Push to Google Calendar failed', e);
        calendarError = 'Saved locally — Google sync failed: ' + (e.message || 'error');
      }
    }
    await saveCalendarEvents();
    render();
  }

  async function deleteCalendarEvent(id){
    const ev = calendarEvents.find(e => e.id === id);
    calendarEvents = calendarEvents.filter(e => e.id !== id);
    if (ev) await deleteEventFromGcal(ev);
    await saveCalendarEvents();
    render();
  }

  function filteredTransactions(now){
    let list = [...transactions];
    if (tableFilter === 'week'){ const {start,end} = getWeekRange(now); list = list.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime()); }
    else if (tableFilter === 'month'){ const y = now.getFullYear(), m = now.getMonth(); list = list.filter(t => { const d = new Date(t.ts); return d.getFullYear()===y && d.getMonth()===m; }); }

    return list.sort((a,b) => b.ts - a.ts);
  }

  function calendarCardHTML(now){
    const cursor = ensureCalendarCursor(now);
    const year = cursor.getFullYear();

    const monthLabel = cursor.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });

    const todayKey = dateKeyFromTs(now.getTime());

    for (let i = 0; i < firstDow; i++){
      const d = new Date(year, month, -firstDow + i + 1);
      cells.push({ date: d, out: true });

    for (let day = 1; day <= daysInMonth; day++){
      cells.push({ date: new Date(year, month, day), out: false });

    while (cells.length % 7 !== 0){
      const last = cells[cells.length - 1].date;
      cells.push({ date: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1), out: true });

              : 'Connect your Gmail Google Calendar to keep events in sync.'}
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          ${!gcalConfigured ? '' : (!gcalConnected
            ? `<button type="button" class="btn-primary" data-action="gcal-connect" style="flex:0 0 auto; padding:8px 12px; font-size:12px;" ${gcalBusy?'disabled':''}>${gcalBusy?'Connecting…':'Connect Google Calendar'}</button>`
