<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Budget Tracker</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

html, body {
  margin: 0;
  min-height: 100%;
}

#budget-app, #budget-app * { box-sizing: border-box; }
#budget-app {
  --bg-a: #F7DCEA;
  --bg-b: #CBD3EF;
  --plum: #3A2647;
  --plum-2: #4C3260;
  --blush: #F4DCE8;
  --blush-ink: #5B3D5C;
  --mauve: #B98FB3;
  --mauve-deep: #8B5A96;
  --paper: #FFFFFF;
  --ink: #2E1F38;
  --ink-soft: #6E5E77;
  --ink-on-dark: #F5EEF4;
  --ink-on-dark-soft: #C9B9D1;
  --line: rgba(46,31,56,0.08);
  --line-dark: rgba(245,238,244,0.14);
  --good: #3E7C6C;
  --warn: #D4A947;
  --danger: #C1495C;
  --neutral: #9C8FAE;

  --cat-groceries: #3E7C6C;
  --cat-dining: #D4A947;
  --cat-transport: #5C6B8A;
  --cat-shopping: #8B4F8F;
  --cat-bills: #C1495C;
  --cat-health: #3D8B96;
  --cat-travel: #6B3FA0;
  --cat-other: #8A8296;

  font-family: 'Inter', sans-serif;
  color: var(--ink);
  background: linear-gradient(135deg, var(--bg-a) 0%, #E7D3EC 45%, var(--bg-b) 100%);
  min-height: 100vh;
  width: 100%;
  padding: 22px;
}

#budget-app .shell { max-width: 1180px; margin: 0 auto; }

/* ---- top bar ---- */
#budget-app .topbar {
  background: linear-gradient(120deg, var(--mauve) 0%, var(--mauve-deep) 100%);
  border-radius: 20px;
  padding: 16px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  flex-wrap: wrap;
  gap: 12px;
}
#budget-app .brand {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 20px;
  letter-spacing: 0.06em;
  color: #FFFFFF;
  text-transform: uppercase;
}
#budget-app .brand .sub { display:block; font-family:'Inter',sans-serif; font-weight:400; text-transform:none; letter-spacing:0; font-size:12px; color: rgba(255,255,255,0.8); margin-top:2px; }
#budget-app .topbar-actions { display: flex; gap: 10px; }
#budget-app .pill-btn {
  background: rgba(255,255,255,0.16);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.35);
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}
#budget-app .pill-btn.solid { background: var(--plum); border-color: var(--plum); }
#budget-app .pill-btn.insights { background: rgba(255,255,255,0.06); border: 1.5px solid var(--warn); color: #fff; }
#budget-app .pill-btn.insights:hover { background: rgba(212,169,71,0.18); }
#budget-app .pill-btn:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }

/* ---- layout grid ---- */
#budget-app .grid { display: grid; grid-template-columns: 300px 1fr; gap: 18px; align-items: start; }
@media (max-width: 900px) { #budget-app .grid { grid-template-columns: 1fr; } }

#budget-app .left-col { display: flex; flex-direction: column; gap: 18px; }

#budget-app .card {
  border-radius: 20px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s ease;
}
#budget-app .card:hover { transform: translateY(-2px); }
#budget-app .card:focus-visible { outline: 2px solid var(--mauve-deep); outline-offset: 2px; }

/* ---- gauge card ---- */
#budget-app .gauge-card {
  background: linear-gradient(160deg, var(--plum) 0%, var(--plum-2) 100%);
  color: var(--ink-on-dark);
  padding: 26px 20px 22px;
  display: flex; flex-direction: column; align-items: center;
}
#budget-app .gauge-wrap { position: relative; width: 190px; height: 190px; margin-bottom: 14px; }
#budget-app .gauge-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
#budget-app .ring-track { fill: none; stroke-linecap: round; }
#budget-app .ring-fill { fill: none; stroke-linecap: round; transition: stroke-dashoffset 0.6s ease; }
#budget-app .gauge-center {
  position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
}
#budget-app .gauge-amount { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 30px; line-height: 1; }
#budget-app .gauge-label { font-size: 11px; color: var(--ink-on-dark-soft); margin-top: 6px; letter-spacing: 0.03em; }
#budget-app .status-badge {
  display: flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,0.1);
  border: 1px solid var(--line-dark);
  border-radius: 999px;
  padding: 8px 16px;
  font-size: 13px; font-weight: 600;
  margin-bottom: 10px;
}
#budget-app .status-emoji { font-size: 16px; display: inline-block; animation: pulse-emoji 1.8s ease-in-out infinite; }
@keyframes pulse-emoji { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
#budget-app .gauge-caption { font-size: 12px; color: var(--ink-on-dark-soft); text-align: center; line-height: 1.5; }
#budget-app .daily-stats-row { display: flex; gap: 10px; width: 100%; margin-top: 16px; }
#budget-app .daily-stat { flex: 1; background: rgba(255,255,255,0.08); border: 1px solid var(--line-dark); border-radius: 12px; padding: 10px 8px; text-align: center; }
#budget-app .daily-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--ink-on-dark-soft); margin-bottom: 5px; }
#budget-app .daily-stat-value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; }
#budget-app .daily-stat-sub { font-size: 10px; color: var(--ink-on-dark-soft); margin-top: 2px; }
#budget-app .gauge-bar-wrap { width: 100%; margin-top: 4px; }
#budget-app .gauge-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-on-dark-soft); margin-bottom: 6px; }
#budget-app .gauge-bar-track { height: 10px; border-radius: 6px; background: rgba(255,255,255,0.16); overflow: hidden; }
#budget-app .gauge-bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease, background 0.6s ease; }


/* ---- categories card ---- */
#budget-app .cat-card {
  background: var(--blush);
  color: var(--blush-ink);
  padding: 20px;
}
#budget-app .cat-title { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--blush-ink); opacity: 0.75; margin-bottom: 14px; font-weight: 600; }
#budget-app .cat-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; cursor: pointer; }
#budget-app .cat-row:not(:last-child) { border-bottom: 1px solid rgba(91,61,92,0.12); }
#budget-app .cat-circle {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--plum); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600;
  flex-shrink: 0;
}
#budget-app .cat-info { flex: 1; }
#budget-app .cat-name { font-size: 14px; font-weight: 600; }
#budget-app .cat-amount { font-size: 12px; opacity: 0.7; font-family: 'IBM Plex Mono', monospace; }
#budget-app .cat-empty { font-size: 13px; opacity: 0.7; padding: 6px 0; }

/* ---- chart card ---- */
#budget-app .chart-card {
  background: linear-gradient(160deg, var(--plum-2) 0%, var(--plum) 100%);
  color: var(--ink-on-dark);
  padding: 20px;
}
#budget-app .chart-title { font-size: 12px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-on-dark-soft); margin-bottom: 4px; font-weight: 600; }
#budget-app .chart-sub { font-size: 11px; color: var(--ink-on-dark-soft); margin-bottom: 14px; }
#budget-app .chart-svg-wrap svg { width: 100%; height: 128px; display: block; }

/* ---- right table card ---- */
#budget-app .table-card { background: var(--paper); border-radius: 20px; padding: 20px 22px 8px; }
#budget-app .table-head-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 14px; }
#budget-app .table-title { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 20px; }
#budget-app .table-total { font-size: 13px; color: var(--ink-soft); }
#budget-app .table-total b { font-family: 'IBM Plex Mono', monospace; color: var(--ink); }

#budget-app .filter-row { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; border-bottom: 1px solid var(--line); padding-bottom: 12px; }
#budget-app .filter-tab {
  background: none; border: none; font-size: 14px; color: var(--ink-soft); cursor: pointer; padding: 4px 0; font-weight: 500;
}
#budget-app .filter-tab.active { color: var(--ink); font-weight: 700; border-bottom: 2px solid var(--mauve-deep); }
#budget-app .search-input {
  margin-left: auto; background: var(--blush); border: 1px solid var(--line); border-radius: 10px;
  padding: 9px 14px; font-size: 13px; color: var(--ink); min-width: 200px;
}
#budget-app .search-input::placeholder { color: var(--ink-soft); }

#budget-app .row-head {
  display: grid; grid-template-columns: 80px 1fr 110px 130px 90px; gap: 10px;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-soft);
  padding: 0 10px 10px; font-weight: 600;
}
#budget-app .tx-list { max-height: 420px; overflow-y: auto; }
#budget-app .tx-row {
  display: grid; grid-template-columns: 80px 1fr 110px 130px 90px; gap: 10px; align-items: center;
  padding: 13px 10px; border-radius: 12px; cursor: pointer;
}
#budget-app .tx-row:hover { background: var(--blush); }
#budget-app .tx-date { font-size: 12px; color: var(--ink-soft); font-family: 'IBM Plex Mono', monospace; }
#budget-app .tx-desc { font-size: 14px; font-weight: 500; }
#budget-app .tx-card-cell { font-size: 12px; color: var(--ink-soft); }
#budget-app .cat-pill {
  display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px;
  font-size: 11px; font-weight: 600; color: #fff; width: fit-content;
}
#budget-app .cat-pill i { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.8); }
#budget-app .tx-amount { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; text-align: right; }
#budget-app .empty-state { color: var(--ink-soft); font-size: 14px; padding: 40px 10px; text-align: center; }

/* ---- modals ---- */
#budget-app .modal-overlay {
  position: fixed; inset: 0; background: rgba(46,31,56,0.55);
  display: flex; align-items: flex-end; justify-content: center; z-index: 50;
}
#budget-app .modal-card {
  background: var(--paper); width: 100%; max-width: 560px;
  border-radius: 22px 22px 0 0; padding: 24px 20px 30px; max-height: 88vh; overflow-y: auto;
}
#budget-app .modal-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; margin-bottom: 4px; }
#budget-app .modal-sub { font-size: 12px; color: var(--ink-soft); margin-bottom: 18px; }

#budget-app .amount-display { font-family: 'IBM Plex Mono', monospace; font-size: 40px; font-weight: 600; text-align: center; margin-bottom: 16px; }
#budget-app .note-input, #budget-app .text-input {
  width: 100%; background: var(--blush); border: 1px solid var(--line); color: var(--ink);
  border-radius: 12px; padding: 14px; font-size: 15px; font-family: 'Inter', sans-serif; margin-bottom: 16px;
}
#budget-app .note-input::placeholder, #budget-app .text-input::placeholder { color: var(--ink-soft); }
#budget-app .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 18px; }
#budget-app .key {
  background: var(--blush); border: 1px solid var(--line); color: var(--ink);
  font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 500;
  border-radius: 12px; padding: 16px 0; cursor: pointer;
}
#budget-app .key:active { background: var(--mauve); color: #fff; }
#budget-app .modal-actions { display: flex; gap: 10px; }
#budget-app .btn-secondary, #budget-app .btn-primary {
  flex: 1; padding: 15px; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; border: none;
}
#budget-app .btn-secondary { background: var(--blush); color: var(--ink); }
#budget-app .btn-primary { background: var(--mauve-deep); color: #fff; }
#budget-app .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
#budget-app .btn-danger { background: var(--danger); color: #fff; }

#budget-app .settings-field { margin-bottom: 16px; }
#budget-app .settings-field label { display: block; font-size: 13px; color: var(--ink-soft); margin-bottom: 6px; }
#budget-app .settings-field input {
  width: 100%; background: var(--blush); border: 1px solid var(--line); color: var(--ink);
  border-radius: 12px; padding: 14px; font-size: 17px; font-family: 'IBM Plex Mono', monospace;
}
#budget-app .readout {
  font-family: 'IBM Plex Mono', monospace; font-size: 16px; padding: 14px; background: var(--blush); border-radius: 12px; border: 1px solid var(--line);
}

#budget-app .file-drop { border: 1px dashed var(--line); border-radius: 14px; padding: 26px 16px; text-align: center; color: var(--ink-soft); font-size: 14px; margin-bottom: 16px; transition: background 0.15s ease, border-color 0.15s ease; }
#budget-app .file-drop.dragging { border-color: var(--mauve-deep); background: var(--blush); color: var(--ink); }
#budget-app .file-drop-icon { font-size: 26px; margin-bottom: 8px; display: block; }
#budget-app .file-drop input[type="file"] { margin-top: 12px; font-size: 13px; }
#budget-app .import-error { background: rgba(193,73,92,0.1); border: 1px solid var(--danger); border-radius: 12px; padding: 14px; font-size: 13px; margin-bottom: 16px; }
#budget-app .preview-list { max-height: 300px; overflow-y: auto; margin-bottom: 14px; }
#budget-app .preview-row { display: flex; align-items: center; gap: 10px; padding: 10px 4px; border-bottom: 1px solid var(--line); }
#budget-app .preview-row input[type="checkbox"] { width: 20px; height: 20px; flex-shrink: 0; }
#budget-app .preview-day { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); width: 56px; flex-shrink: 0; }
#budget-app .preview-desc { flex: 1; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#budget-app .preview-amount { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; flex-shrink: 0; }
#budget-app .preview-summary { font-size: 13px; color: var(--ink-soft); margin-bottom: 14px; }

#budget-app .detail-list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 4px; border-bottom: 1px solid var(--line); font-size: 14px; }
#budget-app .detail-list-row.clickable { cursor: pointer; }
#budget-app .detail-list-row:hover.clickable { background: var(--blush); border-radius: 10px; }
#budget-app .detail-bar-track { background: var(--blush); border-radius: 6px; height: 10px; flex: 1; margin: 0 12px; overflow: hidden; position: relative; }
#budget-app .detail-bar-fill { height: 100%; border-radius: 6px; position: relative; z-index: 1; }
#budget-app .detail-bar-fill.over-budget {
  background-image: repeating-linear-gradient(135deg, transparent, transparent 5px, rgba(255,255,255,0.35) 5px, rgba(255,255,255,0.35) 10px);
  box-shadow: 0 0 0 1px var(--danger) inset;
}
#budget-app .detail-bar-marker { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--ink); opacity: 0.35; z-index: 2; }

#budget-app .recat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
#budget-app .recat-btn {
  display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
  background: var(--blush); font-size: 13px; cursor: pointer; color: var(--ink);
}
#budget-app .recat-btn.active { border-color: var(--mauve-deep); background: #fff; font-weight: 700; }
#budget-app .recat-btn i { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

#budget-app .loading { text-align: center; color: var(--ink-soft); padding: 80px 0; font-size: 14px; }

@media (prefers-reduced-motion: reduce) {
  #budget-app .ring-fill, #budget-app .status-emoji, #budget-app .card { transition: none; animation: none; }
}
</style>
</head>
<body>

<div id="budget-app">
  <div class="shell" id="app-root">
    <div class="loading">Loading budget…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
(function(){
  // Standalone persistence (replaces host-provided window.storage)
  if (!window.storage) {
    window.storage = {
      async get(key) {
        const value = localStorage.getItem(key);
        return value == null ? null : { value };
      },
      async set(key, value) {
        localStorage.setItem(key, value);
      }
    };
  }

  const root = document.getElementById('app-root');

  const CATEGORIES = [
    { name: 'Groceries', color: 'var(--cat-groceries)', keywords: ['grocery','groceries','market','whole foods','trader joe','safeway','kroger','aldi','grocer','wegmans','sprouts','publix'] },
    { name: 'Dining & Coffee', color: 'var(--cat-dining)', keywords: ['restaurant','cafe','coffee','starbucks','doordash','uber eats','grubhub','chipotle','pizza','bar ','diner','bakery','taqueria','sushi'] },
    { name: 'Transport', color: 'var(--cat-transport)', keywords: ['uber','lyft','gas','shell','chevron','exxon','parking','transit','metro','fuel','76 ','arco'] },
    { name: 'Shopping', color: 'var(--cat-shopping)', keywords: ['amazon','target','walmart','store','shop','mall','costco','best buy','ikea'] },
    { name: 'Bills & Subscriptions', color: 'var(--cat-bills)', keywords: ['netflix','spotify','comcast','verizon','at&t','att bill','insurance','utility','electric','water bill','subscription','hulu','disney+','apple.com/bill','internet'] },
    { name: 'Health & Wellness', color: 'var(--cat-health)', keywords: ['pharmacy','cvs','walgreens','doctor','clinic','gym','fitness','dental','vision'] },
    { name: 'Travel', color: 'var(--cat-travel)', keywords: ['airline','hotel','airbnb','marriott','delta ','united ','southwest','hilton','expedia'] },
    { name: 'Other', color: 'var(--cat-other)', keywords: [] }
  ];

  function categorize(note){
    const n = (note || '').toLowerCase();
    for (const cat of CATEGORIES){
      if (cat.name === 'Other') continue;
      if (cat.keywords.some(k => n.includes(k))) return cat.name;
    }
    return 'Other';
  }
  function catColor(name){
    const c = CATEGORIES.find(c => c.name === name);
    return c ? c.color : 'var(--cat-other)';
  }
  function getCategory(t){
    return t.categoryOverride || categorize(t.note);
  }

  let settings = null;
  let transactions = [];

  function fmt(n){
    const neg = n < 0;
    const v = Math.abs(n).toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
    return (neg ? "-$" : "$") + v;
  }
  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s == null ? '' : s;
    return d.innerHTML;
  }

  function getWeekRange(d){
    const date = new Date(d);
    const day = date.getDay();
    const diffToMonday = (day === 0 ? -6 : 1 - day);
    const monday = new Date(date);
    monday.setHours(0,0,0,0);
    monday.setDate(date.getDate() + diffToMonday);
    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23,59,59,999);
    return {start: monday, end: sunday};
  }
  function fmtRange(start, end){
    const opts = {month:'short', day:'numeric'};
    return start.toLocaleDateString(undefined, opts) + ' – ' + end.toLocaleDateString(undefined, opts);
  }
  function weeksInMonth(date){
    const y = date.getFullYear(), m = date.getMonth();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    return daysInMonth / 7;
  }
  function monthlyFromWeekly(weekly, date){
    return weekly * weeksInMonth(date || new Date());
  }

  async function load(){
    try {
      const s = await window.storage.get('budget:settings', false);
      settings = s ? JSON.parse(s.value) : null;
    } catch(e) { settings = null; }
    try {
      const t = await window.storage.get('budget:transactions', false);
      transactions = t ? JSON.parse(t.value) : [];
    } catch(e) { transactions = []; }
    render();
  }
  async function saveSettings(weekly){
    settings = {weeklyBudget: weekly};
    try { await window.storage.set('budget:settings', JSON.stringify(settings), false); }
    catch(e) { console.error('Failed to save settings', e); }
    render();
  }
  async function saveTransactions(){
    try { await window.storage.set('budget:transactions', JSON.stringify(transactions), false); }
    catch(e) { console.error('Failed to save transactions', e); }
  }
  async function addTransaction(amount, note){
    transactions.push({ id: Date.now() + '-' + Math.random().toString(36).slice(2,7), amount, note: note || '', ts: Date.now(), source: 'manual' });
    await saveTransactions();
    closeAllModals();
    render();
  }
  async function importTransactions(rows, cardLabel){
    const now = Date.now();
    rows.forEach((r, i) => {
      transactions.push({ id: now + '-' + i + '-' + Math.random().toString(36).slice(2,5), amount: r.amount, note: r.note, ts: r.date.getTime(), source: 'statement', card: cardLabel || '' });
    });
    await saveTransactions();
    closeAllModals();
    render();
  }
  async function deleteTransaction(id){
    transactions = transactions.filter(t => t.id !== id);
    await saveTransactions();
    closeAllModals();
    render();
  }
  async function setTransactionCategory(id, cat){
    const t = transactions.find(t => t.id === id);
    if (t) t.categoryOverride = cat;
    await saveTransactions();
    render();
    openDetail('transaction', id);
  }

  function weekSpend(now){
    const {start, end} = getWeekRange(now);
    return transactions.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime());
  }
  function monthSpend(now){
    const y = now.getFullYear(), m = now.getMonth();
    return transactions.filter(t => { const d = new Date(t.ts); return d.getFullYear() === y && d.getMonth() === m; });
  }
  function monthSpendForOffset(offset, now){
    const ref = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const y = ref.getFullYear(), m = ref.getMonth();
    return transactions.filter(t => { const d = new Date(t.ts); return d.getFullYear() === y && d.getMonth() === m; });
  }
  function weeksOverlappingMonth(monthOffset, now){
    const ref = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
    const firstDay = new Date(ref.getFullYear(), ref.getMonth(), 1);
    const lastDay = new Date(ref.getFullYear(), ref.getMonth() + 1, 0);
    lastDay.setHours(23,59,59,999);
    const weeks = [];
    let cursor = getWeekRange(firstDay).start;
    while (cursor.getTime() <= lastDay.getTime()){
      const {start, end} = getWeekRange(cursor);
      const total = transactions.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime()).reduce((s,t)=>s+t.amount,0);
      weeks.push({start, end, total});
      cursor = new Date(start);
      cursor.setDate(cursor.getDate() + 7);
    }
    return weeks;
  }
  function weeksForRange(view, now){
    if (view === 'week'){
      const {start, end} = getWeekRange(now);
      const total = transactions.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime()).reduce((s,t)=>s+t.amount,0);
      return [{start, end, total}];
    }
    if (view === 'month') return weeksOverlappingMonth(0, now);
    if (view === 'lastMonth') return weeksOverlappingMonth(-1, now);
    if (view === 'last3'){
      const combined = [];
      [-2, -1, 0].forEach(offset => {
        weeksOverlappingMonth(offset, now).forEach(w => {
          if (!combined.some(c => c.start.getTime() === w.start.getTime())) combined.push(w);
        });
      });
      combined.sort((a,b) => a.start - b.start);
      return combined;
    }
    return weeksOverlappingMonth(0, now);
  }

  // ---- UI state ----
  let modalState = null; // 'add' | 'settings' | 'import'
  let detailState = null; // {type: 'monthly'|'categories'|'chart'|'transaction', id}

  let entryNote = "";
  let importPhase = 'select';

  function pressKey(k){

  function statusInfo(weekTotal, weeklyBudget, now){
    const {start, end} = getWeekRange(now);
    const elapsed = (now.getTime() - start.getTime()) / (end.getTime() - start.getTime());
    const expected = weeklyBudget * Math.min(Math.max(elapsed, 0), 1);
    const diff = weekTotal - expected;
    const threshold = weeklyBudget * 0.1;
    if (diff < -threshold) return { label: 'Ahead', emoji: '😌', color: 'var(--good)' };
    if (diff > threshold) return { label: 'Behind', emoji: '😬', color: 'var(--danger)' };
    return { label: 'On Track', emoji: '👍', color: 'var(--warn)' };
  }

  function weekBarInfo(total, weeklyBudget){
    const diff = total - weeklyBudget;
    if (diff > 100) return { color: 'var(--danger)', kind: 'deficit', amount: diff };
    if (diff < -100) return { color: 'var(--good)', kind: 'surplus', amount: -diff };
    return { color: 'var(--neutral)', kind: null, amount: 0 };
  }

  // ---- CSV parsing ----
  function findField(fields, candidates){
    const lower = fields.map(f => f.toLowerCase().trim());
    for (const c of candidates){ const idx = lower.findIndex(f => f.includes(c)); if (idx !== -1) return fields[idx]; }
    return null;
  }
  function parseAmountStr(raw){
    if (raw === undefined || raw === null) return null;
    let s = String(raw).trim();
    if (s === '') return null;
    let neg = false;
    if (s.startsWith('(') && s.endsWith(')')){ neg = true; s = s.slice(1,-1); }
    if (s.startsWith('-')){ neg = true; s = s.slice(1); }
    s = s.replace(/[$,]/g, '').trim();
    const num = parseFloat(s);
    if (isNaN(num)) return null;
    return neg ? -num : num;
  }
  function guessCardNameFromFilename(filename){
    let name = (filename || '').replace(/\.[^/.]+$/, '');
    name = name.replace(/[_-]+/g, ' ');
    name = name.replace(/\b(export|transactions?|activity|statement|history|download|csv|data|copy)\b/gi, '');
    name = name.replace(/\s+/g, ' ').trim();
    if (!name) return '';
    return name.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
  }

  function detectCardName(fields, dataRows, filename){
    const lower = fields.map(f => f.toLowerCase().trim());
    const candidates = ['card member', 'card name', 'account name', 'card', 'account'];
    for (const c of candidates){
      const idx = lower.findIndex(f => f.includes(c));
      if (idx !== -1){
        const field = fields[idx];
        const values = dataRows.map(r => (r[field] || '').trim()).filter(Boolean);
        if (values.length > 0) return values[0];
      }
    }
    const guessed = guessCardNameFromFilename(filename);
    return guessed || 'Unknown';
  }

  function parseStatementCSV(text, filename){
    if (typeof Papa === 'undefined') return {error: 'CSV parser failed to load. Check your connection and try again.'};
    const parsed = Papa.parse(text, {header: true, skipEmptyLines: true});
    if (!parsed.meta || !parsed.meta.fields || parsed.meta.fields.length === 0)
      return {error: "Couldn't read that file as a CSV. Export your statement as CSV from your card's website and try again."};
    const fields = parsed.meta.fields;
    const dateField = findField(fields, ['transaction date', 'date']);
    const descField = findField(fields, ['description', 'merchant', 'payee', 'name']);
    const amountField = findField(fields, ['amount']);
    const debitField = findField(fields, ['debit']);
    const creditField = findField(fields, ['credit']);
    if (!dateField || !descField || (!amountField && !debitField && !creditField))
      return {error: "Couldn't find date, description, and amount columns in that file. Expected a CSV with columns like Date, Description, and Amount."};
    const rows = [];
    for (const row of parsed.data){
      const dateVal = new Date(row[dateField]);
      if (isNaN(dateVal.getTime())) continue;
      let amount = null;
      if (amountField) amount = parseAmountStr(row[amountField]);
      else {
        const debit = parseAmountStr(row[debitField]);
        const credit = parseAmountStr(row[creditField]);
        if (debit) amount = Math.abs(debit); else if (credit) amount = -Math.abs(credit);
      }
      if (amount === null) continue;
      const desc = (row[descField] || '').trim();
      rows.push({ date: dateVal, note: desc, amount, selected: amount > 0 });
    }
    if (rows.length === 0) return {error: 'No valid transaction rows found in that file.'};
    rows.sort((a,b) => b.date - a.date);
    const cardName = detectCardName(fields, parsed.data, filename);
    return {rows, cardName};
  }

  function handleStatementFile(file){
    if (!file) return;
    if (!/\.csv$/i.test(file.name) && file.type !== 'text/csv'){
      importError = "That doesn't look like a CSV file. Export your statement as CSV from your card's website.";
      render();
      return;
    }
    const reader = new FileReader();
    reader.onload = (evt) => {
      const result = parseStatementCSV(evt.target.result, file.name);
      if (result.error) importError = result.error;
      else { importRows = result.rows; importCardLabel = result.cardName || ''; importPhase = 'preview'; }
      render();
    };
    reader.onerror = () => { importError = 'Could not read that file. Try exporting it again.'; render(); };
    reader.readAsText(file);
  }



  // ---- render ----
  function render(){
    const now = new Date();

    if (!settings){ root.innerHTML = onboardingHTML(); return; }

    const wTx = weekSpend(now);
    const mTx = monthSpend(now);

    const monthTotal = mTx.reduce((s,t)=>s+t.amount,0);
    const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
    const weekPct = Math.min(Math.max(weekTotal / settings.weeklyBudget, 0), 1);
    const monthPct = Math.min(Math.max(monthTotal / monthlyBudget, 0), 1);
    const status = statusInfo(weekTotal, settings.weeklyBudget, now);

    root.innerHTML = `
      <div class="topbar">
        <div class="brand">Budget Tracker<span class="sub">Week of ${fmtRange(getWeekRange(now).start, getWeekRange(now).end)}</span></div>
        <div class="topbar-actions">
          <button class="pill-btn insights" data-action="open-detail" data-detail="insights">📊 Monthly Insights</button>
          <button class="pill-btn" data-action="open-import">Upload statement</button>
          <button class="pill-btn solid" data-action="open-add">+ Add spend</button>
          <button class="pill-btn" data-action="open-settings">⚙</button>
        </div>
      </div>
      <div class="grid">
        <div class="left-col">
          ${gaugeCardHTML(weekTotal, monthTotal, weekPct, monthPct, status, now)}

        </div>
        <div class="table-card">
          ${tableCardHTML(now, monthTotal, monthlyBudget)}
        </div>
      </div>
      ${modalState === 'add' ? addModalHTML() : ''}
      ${modalState === 'settings' ? settingsModalHTML() : ''}
      ${modalState === 'import' ? importModalHTML() : ''}
      ${detailState ? detailModalHTML(now) : ''}
    `;
  }

  function gaugeCardHTML(weekTotal, monthTotal, weekPct, monthPct, status, now){
    const r = 78;
    const c = 2 * Math.PI * r;
    const off = c * (1 - weekPct);
    const weekRemaining = settings.weeklyBudget - weekTotal;
    const over = weekRemaining < 0;
    const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
    const monthColor = monthPct < 0.7 ? 'var(--good)' : (monthPct < 1 ? 'var(--warn)' : 'var(--danger)');

    const {end: weekEnd} = getWeekRange(now);
    const daysLeftWeek = Math.max(1, Math.ceil((weekEnd.getTime() - now.getTime()) / (24*60*60*1000)));
    const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
    const daysLeftMonth = Math.max(1, daysInMonth - now.getDate() + 1);
    const monthRemaining = monthlyBudget - monthTotal;
    const dailyWeek = Math.max(0, weekRemaining) / daysLeftWeek;
    const dailyMonth = Math.max(0, monthRemaining) / daysLeftMonth;

    return `
      <div class="card gauge-card" data-action="open-detail" data-detail="monthly" tabindex="0" role="button" aria-label="View monthly and weekly breakdown">
        <div class="status-badge" style="color:${status.color}"><span class="status-emoji">${status.emoji}</span> ${status.label}</div>
        <div class="gauge-wrap">
          <svg viewBox="0 0 200 200">
            <circle class="ring-track" cx="100" cy="100" r="${r}" stroke="rgba(255,255,255,0.14)" stroke-width="14"></circle>
            <circle class="ring-fill" cx="100" cy="100" r="${r}" stroke="${over ? 'var(--danger)' : 'var(--good)'}" stroke-width="14" stroke-dasharray="${c}" stroke-dashoffset="${off}"></circle>
          </svg>
          <div class="gauge-center">
            <div class="gauge-amount">${fmt(Math.abs(weekRemaining))}</div>
            <div class="gauge-label">${over ? 'over this week' : 'left this week'}</div>
          </div>
        </div>
        <div class="gauge-caption" style="margin-bottom:14px;">${fmt(weekTotal)} of ${fmt(settings.weeklyBudget)} spent this week</div>
        <div class="gauge-bar-wrap">
          <div class="gauge-bar-label"><span>This month</span><span>${fmt(monthTotal)} / ${fmt(monthlyBudget)}</span></div>
          <div class="gauge-bar-track"><div class="gauge-bar-fill" style="width:${monthPct*100}%; background:${monthColor}"></div></div>
        </div>
        <div class="daily-stats-row">
          <div class="daily-stat">
            <div class="daily-stat-label">Per day · week</div>
            <div class="daily-stat-value" style="color:${over ? 'var(--danger)' : 'var(--ink-on-dark)'}">${fmt(dailyWeek)}</div>
            <div class="daily-stat-sub">${daysLeftWeek} day${daysLeftWeek===1?'':'s'} left</div>
          </div>
          <div class="daily-stat">
            <div class="daily-stat-label">Per day · month</div>
            <div class="daily-stat-value" style="color:${monthRemaining < 0 ? 'var(--danger)' : 'var(--ink-on-dark)'}">${fmt(dailyMonth)}</div>
            <div class="daily-stat-sub">${daysLeftMonth} day${daysLeftMonth===1?'':'s'} left</div>
          </div>
        </div>
      </div>
    `;
  }

  function categoriesCardHTML(mTx){
    const totals = {};
    mTx.forEach(t => { const c = getCategory(t); totals[c] = (totals[c] || 0) + t.amount; });
    const monthAll = mTx.reduce((s,t) => s + t.amount, 0);
    const ranked = Object.entries(totals).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).slice(0,3);
    return `
      <div class="card cat-card" data-action="open-detail" data-detail="categories" tabindex="0" role="button" aria-label="View all spend categories">
        <div class="cat-title">Top categories this month</div>
        ${ranked.length === 0 ? '<div class="cat-empty">No spend logged this month yet.</div>' :
          ranked.map(([name, total]) => {
            const pct = monthAll > 0 ? Math.round((total/monthAll)*100) : 0;
            return `
              <div class="cat-row" data-action="open-category" data-cat="${escapeHtml(name)}">
                <div class="cat-circle" style="background:${catColor(name)}">${pct}%</div>

                </div>
              </div>
            `;
          }).join('')
        }
      </div>
    `;
  }

  function chartCardHTML(now){
    const weeks = weeksOverlappingMonth(0, now);
    const weeklyBudget = settings.weeklyBudget;
    const w = 280, h = 130, padX = 10, padTop = 24, padBottom = 22;
    const plotH = h - padTop - padBottom;
    const max = Math.max(...weeks.map(wk => wk.total), weeklyBudget) * 1.15 || 1;
    const slot = (w - padX*2) / weeks.length;
    const barWidth = slot * 0.5;
    const bars = weeks.map((wk, i) => {
      const x = padX + i*slot + (slot - barWidth)/2;
      const barH = Math.max((wk.total/max) * plotH, 3);
      const y = h - padBottom - barH;
      const info = weekBarInfo(wk.total, weeklyBudget);
      return {x, y, barH, wk, info};
    });
    const budgetY = h - padBottom - ((weeklyBudget/max) * plotH);
    const svgBars = bars.map(b => `
      <rect x="${b.x.toFixed(1)}" y="${b.y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${b.barH.toFixed(1)}" rx="4" fill="${b.info.kind === 'deficit' ? 'url(#overHatch)' : b.info.color}"></rect>
      ${b.info.kind === 'deficit' ? `<rect x="${b.x.toFixed(1)}" y="${b.y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${b.barH.toFixed(1)}" rx="4" fill="none" stroke="${b.info.color}" stroke-width="1.5"></rect>` : ''}
      ${b.info.kind ? `<text x="${(b.x + barWidth/2).toFixed(1)}" y="${(b.y - 6).toFixed(1)}" text-anchor="middle" font-size="9" font-family="'IBM Plex Mono', monospace" fill="${b.info.color}">${b.info.kind === 'surplus' ? '+' : '-'}$${Math.round(b.info.amount)}</text>` : ''}
      <text x="${(b.x + barWidth/2).toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="8" fill="var(--ink-on-dark-soft)">${b.wk.start.toLocaleDateString(undefined,{month:'numeric',day:'numeric'})}</text>
    `).join('');
    return `
      <div class="card chart-card" data-action="open-detail" data-detail="chart" tabindex="0" role="button" aria-label="View week over week spend">
        <div class="chart-title">Week over week spend</div>
        <div class="chart-sub">This month · grey = on track (±$100) · tap to look back</div>
        <div class="chart-svg-wrap">
          <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
            <defs>
              <pattern id="overHatch" width="7" height="7" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
                <rect width="7" height="7" fill="var(--danger)"></rect>
                <line x1="0" y1="0" x2="0" y2="7" stroke="rgba(255,255,255,0.4)" stroke-width="3"></line>
              </pattern>
            </defs>
            <line x1="${padX}" y1="${budgetY.toFixed(1)}" x2="${w-padX}" y2="${budgetY.toFixed(1)}" stroke="var(--ink-on-dark-soft)" stroke-width="1" stroke-dasharray="3,3"></line>
            ${svgBars}
          </svg>
        </div>
      </div>
    `;
  }

  function filteredTransactions(now){
    let list = [...transactions];
    if (tableFilter === 'week'){ const {start,end} = getWeekRange(now); list = list.filter(t => t.ts >= start.getTime() && t.ts <= end.getTime()); }
    else if (tableFilter === 'month'){ const y = now.getFullYear(), m = now.getMonth(); list = list.filter(t => { const d = new Date(t.ts); return d.getFullYear()===y && d.getMonth()===m; }); }
    if (categoryFilter) list = list.filter(t => getCategory(t) === categoryFilter);
    if (searchQuery.trim()) { const q = searchQuery.trim().toLowerCase(); list = list.filter(t => (t.note||'').toLowerCase().includes(q)); }
    return list.sort((a,b) => b.ts - a.ts);
  }

  }

      return `

              <label for="card-label-input">Card name</label>
              <input type="text" class="text-input" id="card-label-input" placeholder="e.g. Chase Sapphire" value="${escapeHtml(importCardLabel)}" />
            </div>
            <div class="preview-list">
              ${importRows.map((r, i) => `
                <div class="preview-row">
                  <input type="checkbox" data-idx="${i}" class="preview-check" ${r.selected ? 'checked' : ''} />
                  <div class="preview-day">${r.date.toLocaleDateString(undefined,{month:'short',day:'numeric'})}</div>
                  <div class="preview-desc">${escapeHtml(r.note) || '<span style="color:var(--ink-soft);font-style:italic;">No description</span>'}</div>
                  <div class="preview-amount" style="color:${r.amount < 0 ? 'var(--good)' : 'var(--ink)'}">${fmt(r.amount)}</div>
                </div>
              `).join('')}
            </div>
            <div class="preview-summary">${selectedCount} of ${importRows.length} selected · ${fmt(selectedTotal)} total</div>
            <div class="modal-actions">
              <button class="btn-secondary" data-action="close-modal">Cancel</button>
              <button class="btn-primary" data-action="confirm-import" ${selectedCount === 0 ? 'disabled' : ''}>Import ${selectedCount}</button>
            </div>
          </div>
        </div>
      `;
    }
    return `
      <div class="modal-overlay" data-action="overlay-close">
        <div class="modal-card" data-stop>
          <div class="modal-title">Upload statement</div>
          <div class="modal-sub">CSV export from your card's website — columns like Date, Description, Amount. We'll pick up the card name automatically where we can.</div>
          ${importError ? `<div class="import-error">${escapeHtml(importError)}</div>` : ''}
          <div class="file-drop" id="file-drop-zone">
            <span class="file-drop-icon">📄</span>
            Drag and drop your statement CSV here, or
            <br/><input type="file" id="csv-file-input" accept=".csv,text/csv" />
          </div>
          <div class="modal-actions">
            <button class="btn-secondary" data-action="close-modal">Cancel</button>
          </div>
        </div>
      </div>
    `;
  }

  function detailModalHTML(now){
    const type = detailState.type;
    if (type === 'insights'){
      const mTx = monthSpend(now);
      const monthTotal = mTx.reduce((s,t)=>s+t.amount,0);
      const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
      const lastMTx = monthSpendForOffset(-1, now);
      const lastMonthTotal = lastMTx.reduce((s,t)=>s+t.amount,0);
      const delta = monthTotal - lastMonthTotal;
      const deltaPct = lastMonthTotal > 0 ? (delta / lastMonthTotal) * 100 : null;
      const daysElapsed = Math.max(1, now.getDate());
      const dailyAvg = monthTotal / daysElapsed;
      const spendTx = mTx.filter(t => t.amount > 0);
      const biggest = spendTx.length ? spendTx.reduce((a,b) => a.amount > b.amount ? a : b) : null;

      const weeks = weeksOverlappingMonth(0, now);
      let ahead = 0, onTrack = 0, over = 0;
      weeks.forEach(w => {
        const info = weekBarInfo(w.total, settings.weeklyBudget);
        if (info.kind === 'surplus') ahead++;
        else if (info.kind === 'deficit') over++;
        else onTrack++;
      });

      const totals = {};
      mTx.forEach(t => { const c = getCategory(t); totals[c] = (totals[c] || 0) + t.amount; });
      const ranked = Object.entries(totals).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).slice(0,5);

      const monthName = now.toLocaleDateString(undefined, {month:'long', year:'numeric'});
      const deltaColor = delta > 0 ? 'var(--danger)' : (delta < 0 ? 'var(--good)' : 'var(--ink-soft)');
      const deltaText = lastMonthTotal === 0 ? 'No spend last month to compare' :
        `${delta >= 0 ? '+' : '-'}${fmt(Math.abs(delta))}${deltaPct !== null ? ` (${delta >= 0 ? '+' : '-'}${Math.abs(deltaPct).toFixed(0)}%)` : ''} vs last month`;

      const body = `
        <div class="modal-sub" style="margin-bottom:14px;">${monthName}</div>
        <div class="detail-list-row"><span>Spent so far</span><span>${fmt(monthTotal)} of ${fmt(monthlyBudget)}</span></div>
        <div class="detail-list-row"><span>vs last month</span><span style="color:${deltaColor}; font-weight:700;">${deltaText}</span></div>
        <div class="detail-list-row"><span>Daily average</span><span>${fmt(dailyAvg)}/day</span></div>
        <div class="detail-list-row"><span>Biggest purchase</span><span>${biggest ? `${escapeHtml(biggest.note || 'No note')} · ${fmt(biggest.amount)}` : '—'}</span></div>
        <div class="modal-sub" style="margin:18px 0 8px;">Weekly pacing this month</div>
        <div class="detail-list-row">
          <span style="color:var(--good); font-weight:600;">😌 ${ahead} ahead</span>
          <span style="color:var(--neutral); font-weight:600;">👍 ${onTrack} on track</span>
          <span style="color:var(--danger); font-weight:600;">😬 ${over} over</span>
        </div>
        <div class="modal-sub" style="margin:18px 0 8px;">Top categories</div>
        ${ranked.length === 0 ? '<div class="cat-empty">No spend logged yet.</div>' :
          ranked.map(([name, total]) => {
            const pct = monthTotal > 0 ? Math.round((total/monthTotal)*100) : 0;
            return `<div class="detail-list-row clickable" data-action="open-category-close" data-cat="${escapeHtml(name)}">
              <span style="width:130px;">${escapeHtml(name)}</span>
              <div class="detail-bar-track"><div class="detail-bar-fill" style="width:${pct}%; background:${catColor(name)}"></div></div>
              <span style="width:70px; text-align:right;">${fmt(total)}</span>
            </div>`;
          }).join('')
        }
      `;
      return wrapDetail('Monthly Insights', body);
    }
    if (type === 'monthly'){
      const wTx = weekSpend(now), mTx = monthSpend(now);
      const weekTotal = wTx.reduce((s,t)=>s+t.amount,0), monthTotal = mTx.reduce((s,t)=>s+t.amount,0);
      const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
      const {start,end} = getWeekRange(now);
      const daysLeftWeek = Math.max(0, Math.ceil((end.getTime() - now.getTime())/(24*60*60*1000)));
      const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const daysLeftMonth = daysInMonth - now.getDate();
      const status = statusInfo(weekTotal, settings.weeklyBudget, now);
      return wrapDetail('Monthly & weekly breakdown', `
        <div class="detail-list-row"><span>Status</span><span style="color:${status.color};font-weight:700;">${status.emoji} ${status.label}</span></div>
        <div class="detail-list-row"><span>This week</span><span>${fmt(weekTotal)} of ${fmt(settings.weeklyBudget)}</span></div>
        <div class="detail-list-row"><span>Days left this week</span><span>${daysLeftWeek}</span></div>
        <div class="detail-list-row"><span>This month</span><span>${fmt(monthTotal)} of ${fmt(monthlyBudget)}</span></div>
        <div class="detail-list-row"><span>Days left this month</span><span>${daysLeftMonth}</span></div>
      `);
    }
    if (type === 'categories'){
      const mTx = monthSpend(now);
      const totals = {};
      mTx.forEach(t => { const c = getCategory(t); totals[c] = (totals[c] || 0) + t.amount; });
      const monthAll = mTx.reduce((s,t)=>s+t.amount,0);
      const ranked = Object.entries(totals).sort((a,b) => b[1]-a[1]);
      return wrapDetail('All categories this month', ranked.length === 0 ? '<div class="cat-empty">No spend logged yet.</div>' :
        ranked.map(([name,total]) => {
          const pct = monthAll > 0 ? Math.round((total/monthAll)*100) : 0;
          return `<div class="detail-list-row clickable" data-action="open-category-close" data-cat="${escapeHtml(name)}">
            <span style="width:120px;">${escapeHtml(name)}</span>
            <div class="detail-bar-track"><div class="detail-bar-fill" style="width:${pct}%; background:${catColor(name)}"></div></div>
            <span style="width:70px; text-align:right;">${fmt(total)}</span>
          </div>`;
        }).join('')
      );
    }
    if (type === 'chart'){
      const weeklyBudget = settings.weeklyBudget;
      const weeks = weeksForRange(chartView, now);
      const max = Math.max(...weeks.map(w=>w.total), weeklyBudget) * 1.1 || 1;
      const views = [
        {key: 'week', label: 'This Week'},
        {key: 'month', label: 'This Month'},
        {key: 'lastMonth', label: 'Last Month'},
        {key: 'last3', label: 'Last 3 Months'}
      ];
      const tabs = `
        <div class="filter-row" style="border-bottom:none; padding-bottom:0; margin-bottom:14px;">
          ${views.map(v => `<button class="filter-tab ${chartView===v.key?'active':''}" data-action="chart-view" data-view="${v.key}">${v.label}</button>`).join('')}
        </div>
      `;
      const budgetPct = Math.min((weeklyBudget/max)*100, 100);
      const body = weeks.map(w => {
        const info = weekBarInfo(w.total, weeklyBudget);
        const tag = info.kind ? `<span style="color:${info.color}; font-weight:700;">${info.kind === 'surplus' ? '+' : '-'}${fmt(info.amount)}</span>` : '';
        const barPct = Math.min((w.total/max)*100, 100);
        return `
        <div class="detail-list-row">
          <span style="width:110px;">${fmtRange(w.start,w.end)}</span>
          <div class="detail-bar-track">
            <div class="detail-bar-marker" style="left:${budgetPct}%"></div>
            <div class="detail-bar-fill ${info.kind === 'deficit' ? 'over-budget' : ''}" style="width:${barPct}%; background:${info.color}"></div>
          </div>
          <span style="width:100px; text-align:right;">${info.kind === 'deficit' ? '⚠️ ' : ''}${fmt(w.total)}</span>
        </div>
        ${info.kind ? `<div style="text-align:right; font-size:11px; margin:-8px 0 8px;">${tag}</div>` : ''}
      `;
      }).join('');
      return wrapDetail('Week over week spend', tabs + body);
    }
    if (type === 'transaction'){
      const t = transactions.find(t => t.id === detailState.id);
      if (!t) { closeDetail(); return ''; }
      const cat = getCategory(t);
      return wrapDetail('Transaction', `
        <div class="detail-list-row"><span>Date</span><span>${new Date(t.ts).toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})}</span></div>
        <div class="detail-list-row"><span>Description</span><span>${t.note ? escapeHtml(t.note) : '—'}</span></div>
        <div class="detail-list-row"><span>Amount</span><span>${fmt(t.amount)}</span></div>
        ${t.source === 'statement' ? `<div class="detail-list-row"><span>Card</span><span>${t.card ? escapeHtml(t.card) : 'Unknown'}</span></div>` : ''}
        <div class="detail-list-row"><span>Source</span><span>${t.source === 'statement' ? 'Statement upload' : 'Manual entry'}</span></div>
        <div class="modal-sub" style="margin-top:16px;">Recategorize</div>
        <div class="recat-grid">
          ${CATEGORIES.map(c => `<button class="recat-btn ${c.name===cat?'active':''}" data-action="recategorize" data-id="${t.id}" data-cat="${escapeHtml(c.name)}"><i style="background:${c.color}"></i>${escapeHtml(c.name)}</button>`).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" data-action="close-detail">Close</button>
          <button class="btn-danger" data-action="delete-entry" data-id="${t.id}" style="flex:1;">Delete</button>
        </div>
      `, false);
    }
    return '';
  }

  function wrapDetail(title, bodyHtml, showDefaultActions){
    return `
      <div class="modal-overlay" data-action="overlay-close-detail">
        <div class="modal-card" data-stop>
          <div class="modal-title">${title}</div>
          <div style="margin: 14px 0;">${bodyHtml}</div>
          ${showDefaultActions === false ? '' : `<div class="modal-actions"><button class="btn-secondary" data-action="close-detail" style="flex:1;">Close</button></div>`}
        </div>
      </div>
    `;
  }

  function onboardingHTML(){
    return `
      <div class="topbar"><div class="brand">Budget Tracker</div></div>
      <div class="card gauge-card" style="max-width:420px; margin: 30px auto; cursor:default;">
        <div class="modal-title" style="color:#fff; margin-bottom:6px;">Set up your budget</div>
        <div class="gauge-caption" style="margin-bottom:20px;">Set a weekly budget — monthly is weekly × weeks in this month</div>
        <div class="settings-field" style="width:100%;">
          <label style="color:var(--ink-on-dark-soft);" for="onb-weekly">Weekly budget</label>
          <input type="number" inputmode="decimal" id="onb-weekly" placeholder="e.g. 200" min="0" step="0.01" />
        </div>
        <div class="settings-field" style="width:100%;">
          <label style="color:var(--ink-on-dark-soft);">Monthly budget (calculated)</label>
          <div class="readout" id="onb-derived-monthly">$0.00</div>
        </div>
        <button class="btn-primary" id="onb-save" style="width:100%;">Start tracking</button>
      </div>
    `;
  }

  // ---- event delegation ----
  const shell = document.getElementById('budget-app');

  shell.addEventListener('click', (e) => {
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const action = actionEl.dataset.action;

    switch(action){
      case 'open-add': openModal('add'); break;
      case 'open-import': openModal('import'); break;
      case 'open-settings': openModal('settings'); break;
      case 'close-modal': closeAllModals(); break;
      case 'close-detail': closeDetail(); break;
      case 'overlay-close': if (e.target === actionEl) closeAllModals(); break;
      case 'overlay-close-detail': if (e.target === actionEl) closeDetail(); break;
      case 'key': pressKey(actionEl.dataset.key); break;
      case 'confirm-add': { const amt = parseFloat(entryAmount); if (amt > 0) addTransaction(amt, entryNote); break; }
      case 'save-settings': { const w = parseFloat(document.getElementById('weekly-input').value); if (w > 0) saveSettings(w); break; }
      case 'confirm-import': { const selected = importRows.filter(r => r.selected); if (selected.length > 0) importTransactions(selected, importCardLabel); break; }
      case 'delete-entry': deleteTransaction(actionEl.dataset.id); break;
      case 'recategorize': setTransactionCategory(actionEl.dataset.id, actionEl.dataset.cat); break;
      case 'filter-table': tableFilter = actionEl.dataset.filter; render(); break;
      case 'open-category': categoryFilter = actionEl.dataset.cat; tableFilter = 'month'; render(); break;
      case 'open-category-close': categoryFilter = actionEl.dataset.cat; tableFilter = 'month'; detailState = null; render(); break;
      case 'clear-category': categoryFilter = null; render(); break;
      case 'open-transaction': openDetail('transaction', actionEl.dataset.id); break;
      case 'open-detail': openDetail(actionEl.dataset.detail, null); break;
      case 'chart-view': chartView = actionEl.dataset.view; render(); break;
      case 'onb-save-noop': break;
    }
  });

  shell.addEventListener('click', (e) => {
    if (e.target.id === 'onb-save'){
      const w = parseFloat(document.getElementById('onb-weekly').value);
      if (!w || w <= 0){ e.target.textContent = 'Enter a weekly budget to continue'; return; }
      saveSettings(w);
    }
  });

  shell.addEventListener('input', (e) => {
    if (e.target.id === 'note-input') entryNote = e.target.value;
    else if (e.target.id === 'card-label-input') importCardLabel = e.target.value;
    else if (e.target.id === 'search-input') { searchQuery = e.target.value; render(); restoreSearchFocus(); }
    else if (e.target.id === 'weekly-input'){
      const w = parseFloat(e.target.value) || 0;
      const el = document.getElementById('derived-monthly');
      if (el) el.textContent = fmt(monthlyFromWeekly(w));
    }
    else if (e.target.id === 'onb-weekly'){
      const w = parseFloat(e.target.value) || 0;
      const el = document.getElementById('onb-derived-monthly');
      if (el) el.textContent = fmt(monthlyFromWeekly(w));
    }
  });

  function restoreSearchFocus(){
    const el = document.getElementById('search-input');
    if (el){ el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
  }

  shell.addEventListener('change', (e) => {
    if (e.target.classList.contains('preview-check')){
      const idx = parseInt(e.target.dataset.idx, 10);
      importRows[idx].selected = e.target.checked;
      render();
    } else if (e.target.id === 'csv-file-input'){
      handleStatementFile(e.target.files[0]);
    }
  });

  shell.addEventListener('dragover', (e) => {
    const zone = e.target.closest('#file-drop-zone');
    if (!zone) return;
    e.preventDefault();
    zone.classList.add('dragging');
  });
  shell.addEventListener('dragleave', (e) => {
    const zone = e.target.closest('#file-drop-zone');
    if (!zone) return;
    zone.classList.remove('dragging');
  });
  shell.addEventListener('drop', (e) => {
    const zone = e.target.closest('#file-drop-zone');
    if (!zone) return;
    e.preventDefault();
    zone.classList.remove('dragging');
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    handleStatementFile(file);
  });

  load();
})();
</script>
</body>
</html>
