  function detailModalHTML(now){
    const type = detailState.type;
    if (type === 'insights'){
      const mTx = monthSpend(now);
      const monthTotal = mTx.reduce((s,t)=>s+t.amount,0);
      const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
      const lastMTx = monthSpendForOffset(-1, now);
      const lastMonthTotal = lastMTx.reduce((s,t)=>s+t.amount,0);
      const delta = monthTotal - lastMonthTotal;
      const deltaPct = lastMonthTotal > 0 ? (delta / lastMonthTotal) * 100 : null;
      const daysElapsed = Math.max(1, now.getDate());
      const dailyAvg = monthTotal / daysElapsed;
      const spendTx = mTx.filter(t => t.amount > 0);
      const biggest = spendTx.length ? spendTx.reduce((a,b) => a.amount > b.amount ? a : b) : null;

      const weeks = weeksOverlappingMonth(0, now);
      let ahead = 0, onTrack = 0, over = 0;
      weeks.forEach(w => {
        const info = weekBarInfo(w.total, settings.weeklyBudget);
        if (info.kind === 'surplus') ahead++;
        else if (info.kind === 'deficit') over++;
        else onTrack++;
      });

      const totals = {};
      mTx.forEach(t => { const c = getCategory(t); totals[c] = (totals[c] || 0) + t.amount; });
      const ranked = Object.entries(totals).filter(([,v]) => v > 0).sort((a,b) => b[1]-a[1]).slice(0,5);

      const monthName = now.toLocaleDateString(undefined, {month:'long', year:'numeric'});
      const deltaColor = delta > 0 ? 'var(--danger)' : (delta < 0 ? 'var(--good)' : 'var(--ink-soft)');
      const deltaText = lastMonthTotal === 0 ? 'No spend last month to compare' :
        `${delta >= 0 ? '+' : '-'}${fmt(Math.abs(delta))}${deltaPct !== null ? ` (${delta >= 0 ? '+' : '-'}${Math.abs(deltaPct).toFixed(0)}%)` : ''} vs last month`;

      const body = `
        <div class="modal-sub" style="margin-bottom:14px;">${monthName}</div>
        <div class="detail-list-row"><span>Spent so far</span><span>${fmt(monthTotal)} of ${fmt(monthlyBudget)}</span></div>
        <div class="detail-list-row"><span>vs last month</span><span style="color:${deltaColor}; font-weight:700;">${deltaText}</span></div>
        <div class="detail-list-row"><span>Daily average</span><span>${fmt(dailyAvg)}/day</span></div>
        <div class="detail-list-row"><span>Biggest purchase</span><span>${biggest ? `${escapeHtml(biggest.note || 'No note')} · ${fmt(biggest.amount)}` : '—'}</span></div>
        <div class="modal-sub" style="margin:18px 0 8px;">Weekly pacing this month</div>
        <div class="detail-list-row">
          <span style="color:var(--good); font-weight:600;">😌 ${ahead} ahead</span>
          <span style="color:var(--neutral); font-weight:600;">👍 ${onTrack} on track</span>
          <span style="color:var(--danger); font-weight:600;">😬 ${over} over</span>
        </div>
        <div class="modal-sub" style="margin:18px 0 8px;">Top categories</div>
        ${ranked.length === 0 ? '<div class="cat-empty">No spend logged yet.</div>' :
          ranked.map(([name, total]) => {
            const pct = monthTotal > 0 ? Math.round((total/monthTotal)*100) : 0;
            return `<div class="detail-list-row clickable" data-action="open-category-close" data-cat="${escapeHtml(name)}">
              <span style="width:130px;">${escapeHtml(name)}</span>
              <div class="detail-bar-track"><div class="detail-bar-fill" style="width:${pct}%; background:${catColor(name)}"></div></div>
              <span style="width:70px; text-align:right;">${fmt(total)}</span>
            </div>`;
          }).join('')
        }
      `;
      return wrapDetail('Monthly Insights', body);
    }
    if (type === 'monthly'){
      const wTx = weekSpend(now), mTx = monthSpend(now);
      const weekTotal = wTx.reduce((s,t)=>s+t.amount,0), monthTotal = mTx.reduce((s,t)=>s+t.amount,0);
      const monthlyBudget = monthlyFromWeekly(settings.weeklyBudget, now);
      const {start,end} = getWeekRange(now);
      const daysLeftWeek = Math.max(0, Math.ceil((end.getTime() - now.getTime())/(24*60*60*1000)));
      const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
      const daysLeftMonth = daysInMonth - now.getDate();
      const status = statusInfo(weekTotal, settings.weeklyBudget, now);
      return wrapDetail('Monthly & weekly breakdown', `
        <div class="detail-list-row"><span>Status</span><span style="color:${status.color};font-weight:700;">${status.emoji} ${status.label}</span></div>
        <div class="detail-list-row"><span>This week</span><span>${fmt(weekTotal)} of ${fmt(settings.weeklyBudget)}</span></div>
        <div class="detail-list-row"><span>Days left this week</span><span>${daysLeftWeek}</span></div>
        <div class="detail-list-row"><span>This month</span><span>${fmt(monthTotal)} of ${fmt(monthlyBudget)}</span></div>
        <div class="detail-list-row"><span>Days left this month</span><span>${daysLeftMonth}</span></div>
      `);
    }
    if (type === 'categories'){
      const mTx = monthSpend(now);
      const totals = {};
      mTx.forEach(t => { const c = getCategory(t); totals[c] = (totals[c] || 0) + t.amount; });
      const monthAll = mTx.reduce((s,t)=>s+t.amount,0);
      const ranked = Object.entries(totals).sort((a,b) => b[1]-a[1]);
      return wrapDetail('All categories this month', ranked.length === 0 ? '<div class="cat-empty">No spend logged yet.</div>' :
        ranked.map(([name,total]) => {
          const pct = monthAll > 0 ? Math.round((total/monthAll)*100) : 0;
          return `<div class="detail-list-row clickable" data-action="open-category-close" data-cat="${escapeHtml(name)}">
            <span style="width:120px;">${escapeHtml(name)}</span>
            <div class="detail-bar-track"><div class="detail-bar-fill" style="width:${pct}%; background:${catColor(name)}"></div></div>
            <span style="width:70px; text-align:right;">${fmt(total)}</span>
          </div>`;
        }).join('')
      );
    }
    if (type === 'chart'){
      const weeklyBudget = settings.weeklyBudget;
      const weeks = weeksForRange(chartView, now);
      const max = Math.max(...weeks.map(w=>w.total), weeklyBudget) * 1.1 || 1;
      const views = [
        {key: 'week', label: 'This Week'},
        {key: 'month', label: 'This Month'},
        {key: 'lastMonth', label: 'Last Month'},
        {key: 'last3', label: 'Last 3 Months'}
      ];
      const tabs = `
        <div class="filter-row" style="border-bottom:none; padding-bottom:0; margin-bottom:14px;">
          ${views.map(v => `<button class="filter-tab ${chartView===v.key?'active':''}" data-action="chart-view" data-view="${v.key}">${v.label}</button>`).join('')}
        </div>
      `;
      const budgetPct = Math.min((weeklyBudget/max)*100, 100);
      const body = weeks.map(w => {
        const info = weekBarInfo(w.total, weeklyBudget);
        const tag = info.kind ? `<span style="color:${info.color}; font-weight:700;">${info.kind === 'surplus' ? '+' : '-'}${fmt(info.amount)}</span>` : '';
        const barPct = Math.min((w.total/max)*100, 100);
        return `
        <div class="detail-list-row">
          <span style="width:110px;">${fmtRange(w.start,w.end)}</span>
          <div class="detail-bar-track">
            <div class="detail-bar-marker" style="left:${budgetPct}%"></div>
            <div class="detail-bar-fill ${info.kind === 'deficit' ? 'over-budget' : ''}" style="width:${barPct}%; background:${info.color}"></div>
          </div>
          <span style="width:100px; text-align:right;">${info.kind === 'deficit' ? '⚠️ ' : ''}${fmt(w.total)}</span>
        </div>
        ${info.kind ? `<div style="text-align:right; font-size:11px; margin:-8px 0 8px;">${tag}</div>` : ''}
      `;
      }).join('');
      return wrapDetail('Week over week spend', tabs + body);
    }
    if (type === 'transaction'){
      const t = transactions.find(t => t.id === detailState.id);
      if (!t) { closeDetail(); return ''; }
      const cat = getCategory(t);
      return wrapDetail('Transaction', `
        <div class="detail-list-row"><span>Date</span><span>${new Date(t.ts).toLocaleDateString(undefined,{weekday:'long', month:'short', day:'numeric'})}</span></div>
        <div class="detail-list-row"><span>Description</span><span>${t.note ? escapeHtml(t.note) : '—'}</span></div>
        <div class="detail-list-row"><span>Amount</span><span>${fmt(t.amount)}</span></div>
        ${t.source === 'statement' ? `<div class="detail-list-row"><span>Card</span><span>${t.card ? escapeHtml(t.card) : 'Unknown'}</span></div>` : ''}
        <div class="detail-list-row"><span>Source</span><span>${t.source === 'statement' ? 'Statement upload' : 'Manual entry'}</span></div>
        <div class="modal-sub" style="margin-top:16px;">Recategorize — we'll remember this place for next time</div>
        <div class="recat-grid">
          ${allCategories().map(c => `<button class="recat-btn ${c.name===cat?'active':''}" data-action="recategorize" data-id="${t.id}" data-cat="${escapeHtml(c.name)}"><i style="background:${c.color}"></i>${escapeHtml(c.name)}</button>`).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn-secondary" data-action="close-detail">Close</button>
          <button class="btn-danger" data-action="delete-entry" data-id="${t.id}" style="flex:1;">Delete</button>
        </div>
      `, false);
    }
    if (type === 'manage-categories'){
      const tree = buildCategoryTree();
      return wrapDetail('Categories', `
        <div class="modal-sub">Expand a category → company → transactions. Recategorizing a purchase remembers that place for next time.</div>
        ${taxonomyError ? `<div class="import-error">${escapeHtml(taxonomyError)}</div>` : ''}

        <div class="acc-add-panel">
          <div class="cat-cloud-label">Current categories</div>
          <div class="cat-cloud">
            ${allCategories().slice().sort((a,b) => a.name.localeCompare(b.name)).map(c => `
              <button type="button" class="cat-cloud-pill" style="background:${c.color}" data-action="jump-cat" data-cat="${escapeHtml(c.name)}" title="Jump to ${escapeHtml(c.name)}">
                <i></i>${escapeHtml(c.name)}
              </button>
            `).join('')}
          </div>
          <div class="modal-sub" style="margin:0 0 8px;">Add a category</div>
          <div class="settings-field" style="margin-bottom:8px;">
            <label for="new-cat-name">Name</label>
            <input type="text" class="text-input" id="new-cat-name" placeholder="e.g. Kids, Golf, Pets" value="${escapeHtml(newCatName)}" style="margin-bottom:0;" />
          </div>
          <div class="modal-sub" style="margin:8px 0 4px;">Color</div>
          <div class="color-picker-row">
            ${CATEGORY_COLORS.map(col => `
              <button type="button" class="color-dot ${newCatColor===col?'active':''}" style="background:${col}" data-action="pick-cat-color" data-color="${col}" aria-label="Pick color"></button>
            `).join('')}
          </div>
          <button class="btn-primary" data-action="add-category" style="width:100%;">Add category</button>
        </div>

        <div class="cat-tree">
          ${tree.map(cat => {
            const open = expandedCats.has(cat.name);
            const placeCount = cat.merchants.length;
            const txCount = cat.merchants.reduce((s, m) => s + m.txs.length, 0);
            return `
              <div class="acc-cat ${open ? 'acc-open' : ''}" data-cat-anchor="${escapeHtml(cat.name)}">
                <div class="acc-head" data-action="toggle-cat" data-cat="${escapeHtml(cat.name)}" role="button" tabindex="0" aria-expanded="${open}">
                  <span class="acc-chevron">▶</span>
                  <span class="acc-swatch" style="background:${cat.color}"></span>
                  <div class="acc-title">
                    <div class="acc-name">${escapeHtml(cat.name)}${cat.builtin ? '' : ' · custom'}</div>
                    <div class="acc-meta">${placeCount} place${placeCount===1?'':'s'} · ${txCount} transaction${txCount===1?'':'s'}</div>
                  </div>
                  <span class="acc-total">${fmt(cat.total)}</span>
                  ${cat.builtin ? '' : `<button type="button" class="mini-btn danger" data-action="delete-category" data-id="${escapeHtml(cat.id || '')}">Delete</button>`}
                </div>
                <div class="acc-body">
                  ${placeCount === 0
                    ? `<div class="acc-empty">No places or transactions in this category yet.</div>`
                    : cat.merchants.map(m => {
                        const mKey = merchantExpandKey(cat.name, m.key);
                        const mOpen = expandedMerchants.has(mKey);
                        return `
                          <div class="acc-merchant ${mOpen ? 'acc-open' : ''}">
                            <div class="acc-head" data-action="toggle-merchant" data-cat="${escapeHtml(cat.name)}" data-key="${escapeHtml(m.key)}" role="button" tabindex="0" aria-expanded="${mOpen}">
                              <span class="acc-chevron">▶</span>
                              <div class="acc-title">
                                <div class="acc-name">${escapeHtml(m.label)}${m.standardized ? ' · company' : ''}${m.remembered ? ' · remembered' : ''}</div>
                                <div class="acc-meta">${m.txs.length} transaction${m.txs.length===1?'':'s'}</div>
                              </div>
                              <button type="button" class="cat-pill" style="background:${catColor(cat.name)}" data-action="open-merchant-recat" data-cat="${escapeHtml(cat.name)}" data-key="${escapeHtml(m.key)}" data-label="${escapeHtml(m.label)}" title="Change category">
                                <i></i>${escapeHtml(cat.name)}<span class="pill-edit">✎</span>
                              </button>
                              <span class="acc-total">${fmt(m.total)}</span>
                              ${m.remembered ? `<button type="button" class="mini-btn danger" data-action="delete-merchant-rule" data-key="${escapeHtml(m.key)}">Forget</button>` : ''}
                            </div>
                            <div class="acc-body">
                              ${m.txs.length === 0
                                ? `<div class="acc-empty">Remembered place — no matching transactions yet.</div>`
                                : `<div class="acc-tx-scroll">
                                    ${m.txs.map(t => `
                                      <button type="button" class="acc-tx-row" data-action="open-transaction" data-id="${t.id}">
                                        <span class="acc-tx-date">${new Date(t.ts).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span>
                                        <span class="acc-tx-note">${t.note ? escapeHtml(t.note) : '<em style="color:var(--ink-soft)">No note</em>'}</span>
                                        <span class="acc-tx-amt" style="color:${t.amount < 0 ? 'var(--good)' : 'var(--ink)'}">${fmt(t.amount)}</span>
                                      </button>
                                    `).join('')}
                                  </div>`
                              }
                            </div>
                          </div>
                        `;
                      }).join('')
                  }
                </div>
              </div>
            `;
          }).join('')}
        </div>

        <div class="modal-actions">
          <button class="btn-secondary" data-action="close-detail" style="flex:1;">Done</button>
        </div>
      `, false, true);
    }
    return '';
  }

  function wrapDetail(title, bodyHtml, showDefaultActions, wide){
    return `
      <div class="modal-overlay" data-action="overlay-close-detail">
        <div class="modal-card ${wide ? 'wide' : ''}" data-stop>
          <div class="modal-title">${title}</div>
          <div style="margin: 14px 0;">${bodyHtml}</div>
          ${showDefaultActions === false ? '' : `<div class="modal-actions"><button class="btn-secondary" data-action="close-detail" style="flex:1;">Close</button></div>`}
        </div>
      </div>
    `;
  }

  function unlockHTML(){
    return `
      <div class="topbar"><div class="brand">Home Hub<span class="sub">Home management · cloud sync</span></div></div>
      <div class="card gauge-card auth-card" style="cursor:default;">
        <div class="modal-title" style="color:#fff; margin-bottom:6px;">Sync across devices</div>
        <div class="gauge-caption" style="margin-bottom:20px;">Create a 6-digit PIN on this device, then enter the same PIN on any other phone or laptop.</div>
        <div class="settings-field" style="width:100%;">
          <label style="color:var(--ink-on-dark-soft);" for="access-code">6-digit PIN</label>
          <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" id="access-code" autocomplete="one-time-code" placeholder="••••••" ${authBusy ? 'disabled' : ''} />
        </div>
        ${authError ? `<div class="import-error" style="margin-top:0;">${escapeHtml(authError)}</div>` : ''}
        <div class="modal-actions" style="margin-top:8px;">
          <button class="btn-secondary" id="btn-unlock" style="flex:1;" ${authBusy ? 'disabled' : ''}>Unlock</button>
          <button class="btn-primary" id="btn-create" style="flex:1;" ${authBusy ? 'disabled' : ''}>Create new</button>
        </div>
        <div class="gauge-caption" style="margin-top:16px;">Keep this PIN private — it unlocks your home data.</div>
      </div>
    `;
  }

  function onboardingHTML(){
    return `
      <div class="topbar"><div class="brand">Home Hub<span class="sub">Synced</span></div></div>
      <div class="card gauge-card auth-card" style="cursor:default;">
        <div class="modal-title" style="color:#fff; margin-bottom:6px;">Set up Home Hub</div>
        <div class="gauge-caption" style="margin-bottom:20px;">Set a weekly budget — monthly is weekly × weeks in this month</div>
        <div class="settings-field" style="width:100%;">
          <label style="color:var(--ink-on-dark-soft);" for="onb-weekly">Weekly budget</label>
          <input type="number" inputmode="decimal" id="onb-weekly" placeholder="e.g. 200" min="0" step="0.01" />
        </div>
        <div class="settings-field" style="width:100%;">
          <label style="color:var(--ink-on-dark-soft);">Monthly budget (calculated)</label>
          <div class="readout" id="onb-derived-monthly">$0.00</div>
        </div>
        ${authError ? `<div class="import-error">${escapeHtml(authError)}</div>` : ''}
        <button class="btn-primary" id="onb-save" style="width:100%;">Start tracking</button>
        <button class="btn-secondary" data-action="lock-budget" style="width:100%; margin-top:10px;">Use a different PIN</button>
      </div>
    `;
  }

  // ---- event delegation ----
  const shell = document.getElementById('budget-app');

  shell.addEventListener('click', (e) => {
    const actionEl = e.target.closest('[data-action]');
    if (!actionEl) return;
    const action = actionEl.dataset.action;

    switch(action){
      case 'open-add': openModal('add'); break;
      case 'open-import': openModal('import'); break;
      case 'open-settings': openModal('settings'); break;
      case 'open-categories': {
        currentPage = 'categories';
        modalState = null;
        detailState = null;
        render();
        break;
      }
      case 'open-companies': {
        currentPage = 'companies';
        modalState = null;
        detailState = null;
        merchantRecat = null;
        render();
        break;
      }
      case 'open-transactions': {
        currentPage = 'transactions';
        modalState = null;
        detailState = null;
        merchantRecat = null;
        calendarDraft = null;
        render();
        break;
      }
      case 'cal-prev': {
        const c = ensureCalendarCursor(new Date());
        calendarCursor = new Date(c.getFullYear(), c.getMonth() - 1, 1);
        render();
        break;
      }
      case 'cal-next': {
        const c = ensureCalendarCursor(new Date());
        calendarCursor = new Date(c.getFullYear(), c.getMonth() + 1, 1);
        render();
        break;
      }
      case 'cal-today': {
        const n = new Date();
        calendarCursor = startOfMonth(n);
        selectedCalDay = dateKeyFromTs(n.getTime());
        render();
        break;
      }
      case 'select-cal-day': {
        selectedCalDay = actionEl.dataset.day;
        render();
        break;
      }
      case 'open-cal-add': {
        calendarError = '';
        calendarDraft = {
          dateKey: actionEl.dataset.day || selectedCalDay || dateKeyFromTs(Date.now()),
          title: '',
          notes: '',
          person: 'Family',
          allDay: false,
          startTime: '09:00',
          endTime: '10:00'
        };
        render();
        break;
      }
      case 'edit-cal-event': {
        const ev = calendarEvents.find(e => e.id === actionEl.dataset.id);
        if (!ev) break;
        calendarError = '';
        const allDay = ev.allDay !== false;
        calendarDraft = {
          id: ev.id,
          dateKey: dateKeyFromTs(ev.startTs),
          title: ev.title,
          notes: ev.notes || '',
          person: normalizePerson(ev.person),
          allDay,
          startTime: allDay ? '09:00' : timeStrFromTs(ev.startTs),
          endTime: allDay ? '10:00' : timeStrFromTs(ev.endTs || (ev.startTs + 60 * 60 * 1000))
        };
        render();
        break;
      }
      case 'toggle-cal-allday': {
        if (calendarDraft){
          readCalendarDraftFields();
          calendarDraft.allDay = !!(actionEl.checked);
          if (!calendarDraft.allDay){
            calendarDraft.startTime = calendarDraft.startTime || '09:00';
            calendarDraft.endTime = calendarDraft.endTime || '10:00';
          }
          render();
        }
        break;
      }
      case 'pick-cal-person': {
        if (calendarDraft){
          readCalendarDraftFields();
          calendarDraft.person = normalizePerson(actionEl.dataset.person);
          render();
        }
        break;
      }
      case 'gcal-connect': connectGoogleCalendar(); break;
      case 'gcal-sync': syncGoogleCalendar(); break;
      case 'gcal-disconnect': disconnectGoogleCalendar(); break;
      case 'close-cal-draft':
        if (actionEl.classList.contains('modal-overlay') && e.target !== actionEl) break;
        calendarDraft = null;
        calendarError = '';
        render();
        break;
      case 'save-cal-event': {
        if (calendarDraft){
          readCalendarDraftFields();
          const allDayEl = document.getElementById('cal-allday');
          if (allDayEl) calendarDraft.allDay = !!allDayEl.checked;
          calendarDraft.person = normalizePerson(calendarDraft.person);
          upsertCalendarEvent(calendarDraft);
        }
        break;
      }
      case 'delete-cal-event':
        deleteCalendarEvent(actionEl.dataset.id);
        break;
      case 'toggle-company': {
        const key = actionEl.dataset.key;
        if (expandedCompanies.has(key)) expandedCompanies.delete(key);
        else expandedCompanies.add(key);
        render();
        break;
      }
      case 'back-dashboard': currentPage = 'dashboard'; detailState = null; modalState = null; merchantRecat = null; render(); break;
      case 'close-modal': closeAllModals(); break;
      case 'close-detail': closeDetail(); break;
      case 'overlay-close': if (e.target === actionEl) closeAllModals(); break;
      case 'overlay-close-detail': if (e.target === actionEl) closeDetail(); break;
      case 'key': pressKey(actionEl.dataset.key); break;
      case 'confirm-add': { const amt = parseFloat(entryAmount); if (amt > 0) addTransaction(amt, entryNote); break; }
      case 'save-settings': { const w = parseFloat(document.getElementById('weekly-input').value); if (w > 0) saveSettings(w); break; }
      case 'confirm-import': { const selected = importRows.filter(r => r.selected && !r.duplicate); if (selected.length > 0) importTransactions(selected, importCardLabel); break; }
      case 'dismiss-import-result': importResult = null; render(); break;
      case 'delete-entry': deleteTransaction(actionEl.dataset.id); break;
      case 'lock-budget': lockBudget(); break;
      case 'recategorize': setTransactionCategory(actionEl.dataset.id, actionEl.dataset.cat); break;
      case 'open-merchant-recat':
        merchantRecat = {
          key: actionEl.dataset.key,
          cat: actionEl.dataset.cat,
          label: actionEl.dataset.label || actionEl.dataset.key
        };
        render();
        break;
      case 'close-merchant-recat':
        if (actionEl.classList.contains('modal-overlay') && e.target !== actionEl) break;
        merchantRecat = null;
        render();
        break;
      case 'confirm-merchant-recat':
        if (merchantRecat){
          recategorizeMerchant(merchantRecat.key, merchantRecat.cat, actionEl.dataset.cat, merchantRecat.label);
        }
        break;
      case 'add-category': addCustomCategory(newCatName || (document.getElementById('new-cat-name')||{}).value, newCatColor); break;
      case 'delete-category': deleteCustomCategory(actionEl.dataset.id); break;
      case 'delete-merchant-rule': deleteMerchantRule(actionEl.dataset.key); break;
      case 'toggle-cat': {
        const name = actionEl.dataset.cat;
        if (expandedCats.has(name)) expandedCats.delete(name);
        else expandedCats.add(name);
        render();
        break;
      }
      case 'toggle-merchant': {
        const key = merchantExpandKey(actionEl.dataset.cat, actionEl.dataset.key);
        if (expandedMerchants.has(key)) expandedMerchants.delete(key);
        else expandedMerchants.add(key);
        render();
        break;
      }
      case 'jump-cat': {
        const name = actionEl.dataset.cat;
        expandedCats.add(name);
        render();
        requestAnimationFrame(() => {
          const el = document.querySelector(`[data-cat-anchor="${CSS.escape(name)}"]`);
          if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        break;
      }
      case 'pick-cat-color': {
        newCatColor = actionEl.dataset.color;
        render();
        const el = document.getElementById('new-cat-name');
        if (el){ el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
        break;
      }
      case 'filter-table': tableFilter = actionEl.dataset.filter; render(); break;
      case 'open-category': categoryFilter = actionEl.dataset.cat; tableFilter = 'month'; currentPage = 'transactions'; render(); break;
      case 'open-category-close': categoryFilter = actionEl.dataset.cat; tableFilter = 'month'; detailState = null; currentPage = 'transactions'; render(); break;
      case 'clear-category': categoryFilter = null; render(); break;
      case 'open-transaction': openDetail('transaction', actionEl.dataset.id); break;
      case 'open-detail': openDetail(actionEl.dataset.detail, null); break;
      case 'chart-view': chartView = actionEl.dataset.view; render(); break;
      case 'onb-save-noop': break;
    }
  });

  shell.addEventListener('click', (e) => {
    if (e.target.id === 'onb-save'){
      const w = parseFloat(document.getElementById('onb-weekly').value);
      if (!w || w <= 0){ e.target.textContent = 'Enter a weekly budget to continue'; return; }
      saveSettings(w);
    } else if (e.target.id === 'btn-create'){
      const code = ((document.getElementById('access-code') || {}).value || '').trim();
      if (!/^\d{6}$/.test(code)){ authError = 'PIN must be exactly 6 digits'; render(); return; }
      createCloudBudget(code, null);
    } else if (e.target.id === 'btn-unlock'){
      const code = ((document.getElementById('access-code') || {}).value || '').trim();
      if (!/^\d{6}$/.test(code)){ authError = 'PIN must be exactly 6 digits'; render(); return; }
      unlockCloudBudget(code);
    }
  });

  shell.addEventListener('input', (e) => {
    if (e.target.id === 'note-input') entryNote = e.target.value;
    else if (e.target.id === 'new-cat-name') newCatName = e.target.value;
    else if (e.target.id === 'card-label-input'){
      importCardLabel = e.target.value;
      importRows.forEach(r => {
        r.duplicate = false;
        r.selected = r.amount > 0;
      });
      markImportDuplicates(importRows, importCardLabel);
      render();
      const el = document.getElementById('card-label-input');
      if (el){ el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
    }
    else if (e.target.id === 'search-input') { searchQuery = e.target.value; render(); restoreSearchFocus(); }
    else if (e.target.id === 'access-code'){
      e.target.value = e.target.value.replace(/\D/g, '').slice(0, 6);
    }
    else if (e.target.id === 'weekly-input'){
      const w = parseFloat(e.target.value) || 0;
      const el = document.getElementById('derived-monthly');
      if (el) el.textContent = fmt(monthlyFromWeekly(w));
    }
    else if (e.target.id === 'onb-weekly'){
      const w = parseFloat(e.target.value) || 0;
      const el = document.getElementById('onb-derived-monthly');
      if (el) el.textContent = fmt(monthlyFromWeekly(w));
    }
  });

  function restoreSearchFocus(){
    const el = document.getElementById('search-input');
    if (el){ el.focus(); const len = el.value.length; el.setSelectionRange(len, len); }
  }

  shell.addEventListener('change', (e) => {
    if (e.target.classList.contains('preview-check')){
      const idx = parseInt(e.target.dataset.idx, 10);
      importRows[idx].selected = e.target.checked;
      render();
    } else if (e.target.id === 'csv-file-input'){
      handleStatementFile(e.target.files[0]);
    }
  });

  shell.addEventListener('dragover', (e) => {
    const zone = e.target.closest('#file-drop-zone');
    if (!zone) return;
    e.preventDefault();
    zone.classList.add('dragging');
  });
  shell.addEventListener('dragleave', (e) => {
    const zone = e.target.closest('#file-drop-zone');
    if (!zone) return;
    zone.classList.remove('dragging');
  });
  shell.addEventListener('drop', (e) => {
    const zone = e.target.closest('#file-drop-zone');
    if (!zone) return;
    e.preventDefault();
    zone.classList.remove('dragging');
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    handleStatementFile(file);
  });

  load();
})();
</script>
</body>
</html>
